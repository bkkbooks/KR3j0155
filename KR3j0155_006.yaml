  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0155_WYG_006-1a, image: WYG0867/WYG0867-0291a.png}
body:
  text: 南園漫録卷六明張志淳撰文姜幼時讀春秋至於夫人姜氏薨葬我小君文姜便不可曉及長而問之治春秋者不過本胡氏說以先書夫人孫於齊及哀姜薨於夷齊人以歸為謹之於始而已恐是說終牽强不可通也夫以文姜之通兄弒夫其淫惡與武瞾埒而聖人書法僅僅若此朱子謂平生不敢說春秋又謂春秋自難理㑹其謂是夫因革義自三皇五帝三王皆建號唯秦政自以為德兼三皇功過五帝遂稱皇帝自三代以上皆封建唯秦政遂罷侯置守自漢髙以上皆無年號唯漢武帝始立年號夫秦皇漢武皆公論所不與其所建置則後世不可易者如此豈非其人則非其計則是所以足為後世法耶又唐虞夏啇周秦漢晉隋唐宋皆以封國之名建有天下之號元有天下其初仍舊號蒙古後其臣始倣拓拔改姓之意而為有天下之號曰元且徵引唐虞之字以就其以義立號之說至皇朝繼之因亦以義立號而萬世不可昜易大隨時之義書垂善無常主之訓大學憎而知其善其此之謂也不然春秋書天王而石勒之僣王為是有虞以氏號而霸先之號陳為得矣此豈易言也哉此豈易識也哉微子或問朱子以武王既誅紂矣時微子為紂兄又賢立以為君夫豈不可朱子不答愚以為使武王如或人之見則武王不足以為聖人矣蓋聖人之心大公無我聖人之道與時偕行天之生紂已絶啇命矣武王奉天敢昧此意以利其名哉又當時八百之諸侯同奉周矣武王復立微子則八百之諸侯可能聼武王以立微子哉借曰聼武王而立微子矣則四海之民讐紂者可能帖然而安乎况已誅天子再復臣位雖以武王之聖能處之無嫌而周之公劉后稷之業子孫百世之計九州四海之亂有不自我而作乎或曰觀書經旅啇士之文告則民猶思商自蘇氏以為在周為頑在商為良遂沿習莫考夫不靖者皆紂之黨也溺紂之荒淫逸樂以有位於朝者何啻飛廉輩數人而已哉此其黨與實繁有徒所以誘惑齊民又不可勝計也乃指為在商為良豈不誤哉夫民則去惡歸善也士則假善恣惡也若以為真而與之則亂從兹起不但公劉后稷不血食而貽禍罔極武王殆亦宋襄之流矣天命人心之去留聖人精義入神之大用於斯焉在此豈膠固淺見所能測乎或疑莾操懿溫之賊得斯說而肆是不然公私理欲誠僞之不同而已嘗疑朱子之不答意蓋在此無間言漢杜鄴傳謂孔子善閔子騫能守禮不茍從親之所行無非理者故人無可間也顧又不及昆弟其亦以是而無間與如此解則閔子之為孝尤大矣然終過於求深但視今之為舉業學者口耳循習中無所知則優矣諸葛堰城南八里有堰溉田甚廣舊名諸葛堰每嵗修堤竹木為害特甚成化戊子髙郵朱御史暟以􅀢易之迄今無擾可謂才而惠矣今祠於名宦剛明華容王户侍儼在部時值考察京官而吏部與都察院皆慮致怨則决於其長時戶書正缺王慨然任之獨戶部所黜屬官最多竟亦無怨之者可謂剛明矣後王兩被劾於言官人疑其為此王曰不然兹有由吾巡撫河南藩司以修黃河嵗用之夫銀請曰夫當分送某內臣某閣老某尚書侍郎吾允之仍舊而已布政某初亦不計靈寶許戶侍初罷官家居也其二子皆居言路所以每劾由此詞氣和平殊可敬也人事豫為驗封主事見司務㕔遣吏送布按府書帕因謂二僚曰此加諸文選考功猶有謂於吾輩何居一僚曰此何足計二司正郎此時已有織金幣二矣豫以嘗任文選主事亦皆如此笑曰正郎行事主事豈容知耶再任稽勳員外郎又值司務送書帕因又曰驗封猶有謂為封贈也於斯何居一僚又所云如前後任考功文選郎中懲斯言决無私受然果有書帕之外之幣但亦言之過甚也然苦却之矣後皆以為薄彼如今陸兵書完為江西憲長時别餽幣一端不受後在南京常與之㑹終是介意也又南京金兵侍澤考滿鈞陽馬公間詢豫曰金亞卿於汝有人事否答以有扇四柄帕二方書二册馬曰於吾之禮幾乎數十兩汝豈無半乎一時憤辨傷急公微哂曰吾子為陸安知州考滿買茶作吏部人事吾所知也則又辨曰茶為禮時志淳為主事亦不多值以老大人故亦各有香與帕答之公徐曰若如汝言則今吏部司屬爭求入何意哉豫乃為公反覆辨論且云為求人事貨利而入者豈曰皆無但亦愚耳果曰求利雖何官不可求利果志不在利如老大人不受金亞卿之幣豈待强乎公稍解出遇太僕少卿楊晉叔問所以備述告之楊曰子言誠是但云何官不可求利亦過激豫請其故楊曰我升出已三月矣比為考功時雖鄉里寧有一帕相餽乎以此謂子言過也後豫每與馬公爭用人不從則通不復言或即退公始曰吾今知汝矣假使今日行事者於汝家得金千兩吾亦知是人寄汝家者非以他也但不可太直終為身名纍耳當時感公之知而不然其教後乃知公子為錦衣者每來囑事不從時謗於公公不信而隂訪之久乃有此說公可謂詳慎無私於子矣然豫竟以不然公教而致敗則公亦有見於未來者與或謂公名迹多為於子溺愛而損何以云無私於子哉豫特以其知豫一莭言耳與除洪武之制外衛軍七分屯種三分操備蓋以七人所種之榖飬三人也但初則一軍授田二十畝種榖三石二斗牛犂嵗徴穀五十石入屯倉每月支榖二石嵗支二十四石為家小糧支三石二斗為種榖是徴五十石入倉其實在官止二十二石八斗也後官吏為姦屯倉既逺漸不可支七分軍嵗納榖五十石益困每告訴皆云莫可改後都指揮張麟精審其弊遂為奏改名曰與除謂以家小食榖二十四石及種榖三石二斗皆與軍而除其嵗徴之榖也然榖之納亦多弊遂照例以米四斗折榖一石使嵗納米九石一斗二升於是軍不困而官易徴迄今便之夫立法以榖在軍易費曽不知官吏之姦為尤大也然在上者皆委之制而不恤麟以武辨能念人困又能身任其事而垂便利於永久可謂賢矣麟廉甚靖逺伯王公驥能知而重之今亦列於滇之人物云永昌永昌攸始後漢書極詳自洪武二十三年武官欺誕以為金齒後雖王靖逺輩立學校然竟不知在後漢已有學校文章也然豈惟王公輩雖以邱文莊之博學多聞其載諸史綱者猶夫前也以是知考古之不易益州益州今四川成都府也諸葛武侯所謂益州疲弊者是也然漢武帝以滇王國置益州郡則今雲南至大理亦益州也漢志所謂分益州置永昌郡者是也今人知四川為益而不知滇為益者多矣金齒金齒非地名也事見於漢唐至元伐緬伐八百為金齒夷所遮遂伐金齒諸國此正東漢所謂永昌徼外之夷即今大伯夷種也後元立通西府於銀生甸即金齒夷之地地有蒙樂山最後不能守移金齒衛於永昌府洪武十六年永昌府為思倫所屠指揮李觀猶以通西府印來署掌永昌府事又元初設大理金齒等處都元帥府於永昌則內外之分猶嚴自指揮胡淵革永昌府為金齒司彼武夫逞私固無所知然王靖逺驥楊刑侍專能復立學校為碑記竟不知其原而以余齒夷名誤稱至今祇可嘆也老佛朱子感興於老佛二氏意有輕重人嘗疑之纍見雜說中此無他佛之害大老之害小故也然亦朱子親見白玉蟾輩而悅之所以其詞尤不覺右之也然終不往從此朱子所以為正也但道雖正矣而亦未究其終刀圭入口白日飛升如此何飛升者三五十年人或見之過此則再不可見蓋所錬之神久亦散也若曰彼仙者固長在曷於空中二三嵗一逰則慕其道者自多又何必如吾儒著書立教以導人也著書以導人學其道則彼固自知不能以其所錬之神長存天地間也既不能長存則勤苦棄世若彼而終歸澌泯消散竟何益哉由是又為蓬萊五城十二樓三清仙籍之說以救之正猶佛本見其類之貪競淫汗一切絶之以為大快而死矣而恐人不尚又為輪回報應之說以救之也老有飛升長生之事而人終不知其飛升之不可長故朱子亦信之佛有輪回報應之說而人終不知更生之事為間有是故楊叔子探環之事咸書之殊不思仙佛殊術異技若要之久揆之道則自可不辨而明矣以朱子尚以所見信其事而不要其終則王縉桞子厚蘇黃以下至宋景濓以儒附佛而終不悟者又足言哉宜乎自王公以上齊民以下歷千餘載冥然曰輝曰道日新月盛而與聖人之教相終始也噫詠鸚鵡郡有一士以所題鸚鵡詩告先人先人嘗誦之曰此可以名湯鸚鵡以對鄭鷓鴣矣惜逺地無與張之也因志之翠閣香閨帶緑隂忽聞靈舌囀嬌音捴將懷䄂溫存意不稱雲林自在心籠絡反因毛羽誤矜誇休羡賦辭深隴山烟雨春雛小莫遣虞羅著意尋湯名淙字廷用號礐菴韓信太史公論韓信以為學道謙讓不伐功矜能可比周召太公後世血食矣不務出此天下已定乃謀叛逆夷滅宗族不亦宜乎豫嘗思之雖使信謙讓不矜伐終亦不免蓋信唯用兵取勝以圖富貴其身初不在於為民如置軍死地以破趙自將三十萬先合餌項羽不利而却其以無罪死於趙楚者蓋不知幾萬矣欺其愚而愚不悟凡信之用兵皆此類也信所殺無罪之人不减楚天道固以夷滅宗族報之豈不矜不伐所能免乎前乎信如白起後乎信如楊素不族誅於其身必於其子孫天道昭昭不可掩也太史公只據事立論未嘗深求若曰學道則固非信之所能矣南園漫録卷六
