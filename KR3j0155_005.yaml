  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0155_WYG_005-1a, image: WYG0867/WYG0867-0284c.png}
body:
  text: 南園漫録卷五明張志淳撰六科稱水東日記謂公文承旨皆稱五府六部都察院六科給事中景泰間李顯為都給事中強加都字為失又云今止稱六科亦未為當夫五府都督其官也六部尚書其官也都察院都御史其官也今以為未當則是仍稱六科給事為當矣如此則五府六部俱當加官名如六科又何以獨稱其衙門乎五府有都督同知僉事六部有侍即都察院有副都御史僉都御史如李顯要稱六科都給事中則當稱五府都督六部尚書都察院都御史也今以為非而不稱六科都給事中却又以稱六科為未當則必稱六科給事中為當則五府稱都督同知僉事六部稱侍即都察院稱副都御史僉都御史乃與六科稱給事中一體矣其可乎哉蓋府部都察院以都督尚書都御史為尊官以同知僉事侍即副僉都為佐二六科以都給事中為尊官以左右給事中給事中為佐二今只稱六科正與府部之稱相合顧又非彼而是此殆不可曉稱父母今天下士夫皆稱本府州縣官為父母大人稱者以是外得忠厚之名內取身家之利見稱者以是外詫尊崇之名內獲結託之利故交相尚而不可改矣然書曰元后作民父母詩曰豈弟君子民之父母大學孟子亦屢見之則父母二字皆人君之稱也今通以加之府州縣官甚至鄰封府州縣又甚至主簿典史又甚至稱府官為祖父母稱布政司官為曽祖父母是等府於人君之上而布政司又尊無與加矣揆以天子作民父母之義豈不僣乎夫俗稱天子亦曰爺爺爺爺亦祖父之稱也乃又加曽字於上是比爺爺之稱尤重矣豈不悖乎設使誠以墳墓桑梓之故則亦不應以天子之稱加之况稱之如此其尊一不得利則明劾隂構造謗詆毁無所不至有父母之義者固如是乎蓋緣鄉宦始於求利於有司故為此不情之稱而不耻有司喜於見尊於鄉宦故安受過情之諂而不辭夫不耻則又獲名譽之美不辭則又取交通之利故上下相尚既乖於禮尤病於民而通不可變矣或謂孔子何以稱魯為父母之國曰孔子只以父母所生之國稱之初不聞其稱鄹邑長為父母亦不聞其稱魯君為父母也且周為封建魯自君國孔子亦未嘗以父母稱魯君今天下四海統於天子至尊無對而以詩書所稱天子之稱加於府州縣之臣可乎建安楊府丞旦為考功即中時嘗言不忍以父母二字加於人雖人不悅我竟不忍改志淳甚是其見因推而論之田雙輟耕録言田一雙為四畝云因見雲南雜志始知之近見唐書南詔傳言田一雙為五畝官給田四十雙則為田二百畝且與招客先開四十雙之句合恐陶偶未之見耳大臣王嘉為丞相以諌董賢增封忤哀帝得罪當時議即議猶以為聖王於大臣在輿為下御坐為起疾病視之無數進之以禮退之以義今嘉罪雖著大臣祼形就笞非所以重國也以是觀漢於大臣雖有誅戮不逮於宋然禮之亦重矣𢎞治四年禮部尚書耿公裕侍即倪公嶽周公經皆送錦衣衛鎮撫司去衣笞二十而倪體肥碩去衣之時尤增多口後耿倪二公皆為吏書卒官周為戶書去位一時有識謂三公皆時望在位通不及十年孰若下獄後從容以疾求去為優也此所謂祼形就笞者與中庸志淳居學宫時見一官問中庸二字所出曰中出堯之執中庸出易之庸德近觀周禮大司樂以樂德教國子曰中和祗庸孝友鄭氏訓庸為有常則中庸二字周公已全具於教矣覆杯杜詩教兒且覆掌中杯虞注以覆為飲酒嘗見家語孔子問子路使者云醢之矣孔子遂覆醢韓非子子路要作溝者於五父之衢而餐之孔子使子貢往覆其飯則覆字之義明甚而覆杯為不注酒不待言虞何以不考禮服輟耕録謂元以婦人禮服曰袍乃逹旦稱漢人則曰團衫南人則曰大衣今自京師及天下皆稱婦人禮服曰𫀆豈沿習已深與生口魏志王昶傳注云任嘏與人共買生口各顧八匹則名牛馬驢騾為生口舊矣賴字今人以物相質不還曰賴然左傳今鄭人貪賴其田則賴之為義亦有本矣轉注訓志淳幼讀解曰轉注如考老之類假借如令長之類竊疑令長以圈法之字多故可言類若考老則不見其類也殊不能自決近見王柏正始之音引長為長長行為行行為轉注而以考老之訓為非極為有理乃知許慎以考老之類為轉注以令長之類為假借者真誤也四書大全小注亦漫取之不復致察况初學之士哉或疑如此則轉注似假借矣殊不知假借如豪能二字本二獸也假借之言人之有德有才為豪為能也假借於本字無義意而借用之轉注於本字有義意而圈别之故不同也必如是然後轉注二字之解方明轉注者轉其聲而圈注之也且考老之類今除二字其類何在乎以此見宋人之學猶精深於今今人為舉業所限一得登科再不事學矣何由能精慱蓋四書大全之成彼名一時者亦只據許慎之謬而不及王柏之説則又無怪乎今之為舉業者矣用私報宋人嘗擬張浚於孔明周密及他書辨之明矣復有一事如私汪伯彥之引進而與秦檜奏復其官不知孔明可為此否又秦檜既罷黃龜年等論之其姦著矣其乞扈從不許髙宗猶在疑似之間也因浚始召赴行在浚初不過以檜從汪伯彥學而浚為伯彥所引進故也私意盤結基禍如此乃欲復讐中國其可得乎浚復言與之共事始知其暗非初不知如胡安國也溺於伯彥之舊而昧於公也亦非真知其暗也後為檜逐而方有此言也史信浚知檜暗之言而察浚以私昧之於始此豈浚之本心也哉檜之姦惡而才足濟之夫豈暗者若曰暗於主和不肯復讐以異浚見亦其姦之至者而顧以為暗豈得其實乎宜乎檜能傾浚而中髙宗之意也浚之起檜於前王次翁之保檜於後其揆一也籠竹杜詩榿林礙日吟風葉籠竹和煙滴露稍虞注榿甚明而不注籠嘗見唐書南詔傳吐蕃顒城將楊萬波約降事泄吐蕃以兵五千守韋臯將擊破之萬波與籠官拔顒城以來又舊唐書吐蕃傳亦有籠官太籠官之稱又韋臯傳擒籠官四十五人擒主籠官莭度則籠固吐蕃之地名籠竹蓋籠地所産之竹也故以對榿林並坐𢎞治中北兵火篩寇邉勢甚猖獗時鈞陽馬公文升以少傅兼太子太傅為兵書朝廷特所倚重命閲兵於教場又命司禮監太監李榮同閲馬欲與李並坐往返言再三榮竟不允遂各居一幕而遞閲之夫以保傅之官掌大司馬之柄又值𢎞治之世內臣之自尊猶若此無怪乎漢唐之末造也遷獄永昌文廟東有鎮撫司每考訊搒掠聲徹禮殿志淳在學時隨類告遷於上司皆難之後常山樊公瑩為御史至永昌僉以樊有清聲亟往告焉難之尤甚時成化已未也無何有內臣來鎮守偽好文試往告焉即遷去又無幾何有言於後之鎮守者又即遷於城之東至今上下便之夫前之居上者貪汙不事事宜其難矣樊以廉潔著名而於義事亦如此誠使有制不敢擅遷則內臣皆即日遷之不聞在上以制非之者使於事理當遷又何以畏忌如是也今御史巡按歸皆考以不推姦避事方復道求其實稱此五字以樊之名或在歉已論人物臨川吳氏謂張留侯諸葛武侯狄梁公范文正公功業不同而同為百代殊絶之人物遭時雖有異易地則皆然此皆根本宋儒成説以立論而非真知四人者也蓋武侯之出處與學力才識殊非三公所能知亦非三公所能及此所以謂之三代以上之人物也假曰不然則請質之三顧方起與相從於留者孰重子弟死義於國與倡王諸吕者遺教孰得才由於學學由於靜與事黃石以智計名者孰正身都將相而取信天下與事女主而取愧於姨母者孰優以益州之地而振動中國司馬氏畏服以世與奉中國之大而困於西羌以幣獲免者孰愈或曰此所任有專否也曰所任有專否正由於所藴之不同所藴之不同是以隨時以就功名而出處有不及此正在所由之學術未精純而所飬之才力未充大也學未精純才未充大茍使三公處漢未不免仕吳與魏必不仕吳魏亦不過少優於法正蔣琬輩而已何以同諸葛武侯哉或又曰留侯功業大程子稱其有儒者氣象識者嘗以並論恐不可少則曰程子取其去之知而言其學其正固非武侯比也須深思方得之豈可襲人言以自誣哉故曰吳氏之言皆踵宋儒成説以立論而非真知其人者也字義妙好媺三字皆從女儒仙佛三字皆從人古人制字固不可謂無意至於人之所需為儒人為居山為仙人而弗人為佛其義意又各有在左右左右之尚各説家不一然觀前漢百官表十左庶長十一右庶長十二左更十三中更十四右更則官次尚左與今同但中猶在左下右上今五軍都督府與各衛所則以中為尊矣子糾程子以齊桓公為兄子糾為弟朱子取之按春秋傳昭公二十二年王室亂劉子單子以王猛居於皇秋劉子單子以王猛入於王城注猛未踰年稱王以猛為宜立也是故春秋之誼茍宜立也則糾雖未得國成之為子糾猛雖未得京師成之為王猛又按荀子曰齊桓前事則殺兄而爭國則子糾為兄在春秋戰國皆然當時必無誤至程子始以為弟而朱子取之莫考所自竊意程子因孔子稱管仲而以召忽為匹夫匹婦之諒無以釋其意故以糾為弟而求合孔子諒忽而功仲之意朱子至此章亦費力辨論故不得不取程子之言以為據然盡廢當時之實而以子糾為弟恐亦不可嘗因是而求得所以不必以子糾為弟誣桓公為兄而於孔子之言春秋荀子之實自不相病之論此不暇載書二義杜詩古人已用三冬足年少今開萬卷餘其意以學書為詩書之書矣按東方傳云學書三冬文史足用乃今之字書在漢則史書篆𨽻之類也故曰文史足用觀其下曰十五學擊劍十六學詩書則前三冬所學為字書可知今為詩率承杜誤以為詩書之書矣王孫幼誦王維芳草年年緑王孫歸不歸之句不曉所以問之郡中人皆不對偶見本草説曰草一名王孫則知維詩之命意矣長楊唐人朝元閣上西風急都入長楊作雨聲只以長楊為宫名故不可曉後值今喬禮書希大為太常少卿祀西嶽為豫言親歷其地有楊數株猶在閣基之西非宫名也南園漫録卷五
