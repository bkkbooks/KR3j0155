  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0155_WYG_009-1a, image: WYG0867/WYG0867-0312c.png}
body:
  text: 南園漫録卷九明張志淳撰花押輟耕録載元時䝉古色目人為官者多不能執筆花押例以象牙或木刻而印之以為押字用印始於周廣順二年因平章李榖以病臂辭位詔令刻名印用正德己巳豫在南京戶部見各監所出長單太監少監監丞一監不下二十餘員皆是印押凡解納錢糧必於原額三五倍至十餘倍方獲長單不然不得完本部咨行都察院各行巡按御史拘追曽見楊州解鹽三萬斤於三監上納解官忽然令𨽻背銀入部哭訴云兩監已借補鹽值十分完矣今某監借此銀三百兩尚打出不收告欲自縊豫諭以死亦徒死則請行於本府諭以不可見於行則請代言因知某監掌印者頗純良乃遣人告之彼隨令人回言曰先年止五員官今簽書二十餘員彼不押其印字我雖掌印將如之何借使以我所有分以與之亦何能得其押字怪我則誤矣聞其說遂慰諭其官而遣之夫元用闕故使刻花押今內臣皆中國人能識字矣何以亦刻押事定吏部楊主事子器慈溪人也在部好言事而不及大者堂上與諸僚皆少之𢎞治丙寅冬楊又上言初建立泰陵中有水時督造太監李興自𢎞治初有殊寵勢焰薰灼遂下楊錦衣獄尋遣司禮監押楊往衆謂楊必遭興毒手及至興率奴客罵詈欲捶楊司禮太監蕭敬則曰水之有無視之即見李哥何必粗躁取茶出曰楊先生來換茶又顧李曰他士大夫可殺不可辱遂得免回奏實無水楊榜甚重衆又謂楊必至降謫矣不二日即還原職歸部詢所自內臣共欲重其罪太皇太后聞之曰他秀才官說有水也是他的意如今沒水便罷如何只要擺布他因此不俟運炭引工即釋當夫興怒之時皆以為禍不可測蕭則為解之及無水之後皆以為謫降必至重而又有望外之宥然則官之在人固有一定之命雖謫降與捶擊之細亦非人所能為也鄉俗永昌五十年前時有為詩者多可觀幼誦一絶云杜宇枝頭百舌吟何人不動惜芳心桃花織雨梨花雪鋪得春愁一寸深又題菜燈云草堂照破虀鹽夢華屋燒殘肉食心如此之類甚多先君五十以前好作詩故與之交往為密因竊記前詩其人姓陶名寧字致逺亦明經與今日為社學師者異矣對父語今閣老西涯李公子兆先頴敏有異才而不事舉業且日唯狎逰於巷曲公知之書於書屋之壁曰今日東街明日西街科場近了秀才秀才兆先見而别題於下曰今日黑風明日黃風調和鼎鼐相公相公蓋時適有多風之異故也一時喧傳都下至內寺俗夫亦能道之兆先不久遂卒公竟無子以姪嗣無以解幼讀孟子集注無以則王乎朱注曰以已通無己必欲言之而不止也見下文共一千二百餘言所以謂之言之而不止也及後滕文公問章則曰無以則有一焉朱注無解下文僅五句共二十三字作必言之而不止則於理不通後見管子言牧民不在多桓公曰善勿已如是又何以行之又桓公曰勿已其免霸乎又桓公答管仲曰無已則鮑叔牙可乎管仲云云桓公曰無已則賔胥無可乎無已字凡數出義皆非是言之不止之義且二字見於戰國之時文字甚多義皆更端之意或者彼時方言如此須以意㑹之自得若以言之不止解已誤作不得已解尤誤須於當時語言文字中求之方免誤矣子糾非弟程子以桓公為兄子糾為弟已質諸春秋荀子而辨之矣今以管子所載觀之尤為可見管子載齊僖公生公子諸兒公子糾公子小白使鮑叔傅小白鮑叔辭稱疾不出管仲與召忽見之曰何故不出鮑叔曰知子莫若父知臣莫若君今君知臣之不肖也是以使賤臣侍小白也賤臣知棄矣召忽曰子固辭無出吾權任子以死亡必免子管仲曰不可召忽曰可吾觀小白必不為後矣管仲曰不然夫國人憎怨糾之母以及糾之身而憐小白之無母也諸兒長而賤事未可知也云云則子糾為桓公之兄明矣諸兒立為襄公弒於公孫無知而無知又弒於雍廪則子糾當立明甚桓公以弟弒兄不可異論矣程子通置不考只取漢薄昭與淮南厲王書有齊桓殺其弟以反國一語為證夫厲王張敖所進美人之子嘗呼文帝為大兄而驕甚故昭一時為書因以子糾為弟而見殺於兄桓公殆以糾比厲王以桓公比文帝以警之也豈可以為信而盡廢漢前諸記乎程子之誤明甚而朱子再不考究則是昭一時書札有為之言顧可加諸春秋傳記管子之上哉斷不然矣解禮誤豫為稽勳員外郎時江夏劉主事績以陳澔禮記集說塗去什四因與之議其說真有考據而陳之說良非也後孫九峰知之謂豫曰陳氏說朝廷已頒降天下不可以劉言改易語人也豫遂棄之今追思之誠有補陳之不足正陳之舛誤者只緣劉狂誕自髙又制行不檢任情放言不久遂出守鎮江府仍不率矩度遂去官而并其說禮之善考索之慱不惟人不及知而豫亦忘矣惜哉死義成化乙巳江西郭御史紳為豫言初選黃巖知縣文選黃郎中孔昭謝翰林鐸俾之訪正學方公之後遂極意尋訪終無所得蓋方公當死難之時有誅十一族不恤之對故親知罔不罹禍逮洪熙將改元始䝉仁廟以太子令㫖釋宥然已無存者矣自後每聞大夫士論公之死以為只如張公紞周公是修輩道自足矣而過以口語犯文廟以自取誅夷慘毒如此謂為賢者之過中然以公之造履精粹豈以過中自處者蓋當時身受主知任天下事非張周二公輩比故必欲如是斯足以盡此心而無少歉冉不暇他計也殆若曰我任君之天下而使至此我一死奚足以償之此其死義所以必至如斯之烈非無見而偶過也果從張周而心可安責可盡公豈好名與義而有所加尚者哉刪述史記孟嘗君傳刪去馮暖三窟之計最為有見矣至并暖問債畢收以何市而反孟嘗君曰視吾家所寡有者皆刪去却别以守而責之息俞多為說要之暖為人收債非得其視吾所寡有之言其敢輒焚劵而返孟嘗君抑何以謝之也此一段似戰國䇿所記近人情為實事而史記更刪之雖文與理皆周備恐終不如䇿之情實得真也細玩之自見天路楚辭山鬼曰余處幽篁兮終不見天路險難兮獨後來朱子在天字作句而謂韓昌黎詩用天路幽險難追攀亦誤近見古賦用天路者甚多如班固通幽賦曰仰天路而同軌馮衍顯志賦曰唯天路之同軌且易亦有天衢之亨安知屈子不用天路而必以路字屬下句乎殆不可曉也己都御史今之左右都御史即秦漢之御史大夫也當時稱為亞相今之左右副都御史即漢之御史中丞也又謂之宫正今之左右僉都御史漢唐宋初無此官故亦通稱為中丞若少别焉後魏嘗以中丞為中尉舉以為稱亦可矣言官選𢎞治中一給事中上疏為急救社稷事其言曰見今强敵欵塞社稷甚危宜急招人納粟以救社稷後值考察又一給事中上疏言外官多賄賂大臣紿主顧以庇之請朝覲官到令緝事衙門遣官校於門外稱盤其行李孫九峰以疏示豫豫以為是吏部之所考選者今復何言孫後選科道稍不專於鬍胖長且訪其友行得人頗精孫出則仍舊矣曰此有英廟㫖疇敢易之由是以鬍胖長為主以考論為名矣故有謡曰選科全不在文章但要生的鬍胖長更有一般堪笑處衣裳穿得硬幫幫然豈止衣裳哉穿厚底靴以示長干內外勢權以交薦殆不可勝記矣豫承乏文選適將考選科道因欲法孫意又以舉業論不足見人識見文學乃以前代諌疏命題先考教官之備選者凡三十餘人無知諫疏體者衆為一閧以為異遂通仍舊而公論猶謂法孫之稍訪其行為是今掌銓者不知文學而剛愎自用遂假不拘形體而惟私惟利惟請託是主既不訪行又不主鬍胖長又不看論優劣見閣下閣老焦公芳王公鏊皆大驚駭夫以人物選固是矣一於人物而通不計其學與行已非况通不計人物乎又以舉業論定之已失其所謂學矣而並此又不論一唯私意人情是從如是而望言官通逹國體公於是非枉直足以發之筆端傳之後世以感動朝廷其可得乎宜乎急救社稷則請招人納粟求清黜陟則請稱官行李也志淳以為皆吏部之所考選亦或近本之說而自愧斯言則多矣定字史記時用定字如陳王定死主父定死之類不一後此不見用唯宋書內見之也然作實作信作真亦通但不若定字朴而文也雞㚇雞㚇菌類也唯永昌所産為美且多雲南亦有頗粗永昌以東至永平縣界尤多但鎮守索之動百斤夷人製之鹵莽故通不可食此物惟六月大雷後斯出於山中或在松下或在林間不定也出一日采者朵小而嫩五六日即爛矣采得洗取土量以鹽煮烘乾少有烟即不堪食采後過夜則香味俱盡所以為難雞以其形言㚇飛而斂足貌雞作蟻全誤㚇作㙡以為菌亦通斗母法天順初武功伯徐公有貞謫豫郡居法明寺之歸休庵士欲見之者候至已刻因詢諸僧僧云公每夜禮斗至三鼓後方寢好事者訪其繇曰公為巡撫時聞一老僧善相且前知因訪之至則老僧不為禮公甚怒老僧曰兹來吾能救公一死何怒欲返公驚其言强坐老僧曰公此去官極品由文轉武但亦遭極刑公懼乃請於老僧授以法令必急方行後天順改元公以功為武功伯入閣尋為石亨所陷置獄明日將行刑其夜大風吹折大明門壞下馬牌亦吹去公遂得謫此語皆有據矣然以一老僧而能以術救一大臣之死命於理亦礙豫意僧或有異術前知其事故假此以屈之而侈其術之神也果曰命當極刑夫豈術之所能遁耶南園漫録卷九
