body:
  text: 南園漫録卷二明張志淳撰拐子馬金烏珠用拐子馬馬相連以革軍亦貫以韋索號長勝軍自言從海上起兵用以取勝然燕慕容恪以鐡鎖連馬簡善射鮮卑五千為方陳而敗冉閔則用兵之法前固有之稱謂𢎞治初三原王公恕為吏書鈞州馬公文升為兵書同朝王公長馬公十嵗及王公以太子太保致仕馬公於𢎞治中以少師兼太子太師為吏書每對豫言及王公不姓不號但曰老天官前輩之謙己敬德如此風裁錢塘倪公嶽𢎞治中以太子少保為吏書一時極有風裁人畏奉之恐後惟為都御史張公敷華一沮蓋公後南來假錦衣官之宅以居後欲償以值堅不受云有鹽在淮乞一書與張獲支則已矣公從之張得書云我知倪冢宰風裁直吏部外官所當奉第某老矣行且謀歸不能屈法以奉也公大悔沮人傑東坡論范增為人傑蓋本漢髙以蕭何張良韓信為人傑即繼以項羽有一范增不能用則漢髙固以人傑許增矣此東坡所本也容齋只據楊氏之論謂增非人傑謂坡論未盡夫增之為人尊以亞父則留言計不用則去且又能逆知漢髙之志不在小終能覆楚非人傑其誰能之豫少嘗作增論惜其不能佐梁聲秦之罪以伐之而假立楚後以為漢資今思之亦不止此蓋羽有蓋世之勇增負間世之智羽既尊已謂以智佐勇而天下無餘事矣殊不知羽雖勇一人之勇也已雖智一人之智也顧再不思求天下之勇智以為勇智此其所以失之信平輩而更不聞薦一士也其志業無成所蔽在此耳使增非傑漢髙肯溢美之於身後耶觀朱子以豪傑許王猛則增以人傑稱不為過而容齋踵楊氏之説為過矣工魚大理出魚細鱗而纎長長不盈尺多腹腴而味美名曰工魚雲南志載之謂土人不識江字因誤為工其説非矣蓋古韻江有工音如陶淵明停雲詩時雨濛濛平陸成江李翺别灊山神文我亦何功路沿大江大理自昔曉文義故用古韻豈昧一江字乎兹非土人不識字乃修志者不識字耳當時閣老陳公文為雲南布政使實總裁之顧亦不察對句翰林院學士一人多或三五人閣老洛陽劉公健修會典成欲德翰林一時升學士者十人時餘姚謝公遷以禮書為大學士在內閣南昌張公升為禮書湯隂袁公守直以禮書掌通政事賈公斌以禮書掌鴻臚事南都禮書忘其名而掌太常事崔禮侍志端復進禮書崔無室家由神樂觀道士京師為之語曰禮部六尚書一員黃老翰林十學士五個白丁朝紳一時盛傳以為的對而有譏警蓋十學士內五人皆成化戊戌閣老萬公安所選為庶吉士者至是三十年而公論終莫掩豫於五人嘗見二三人之作固非誣也第一對句而於時事及萬劉二公之隱皆可考見人言可畏乃如此然吏書亦號文部如許公進劉公宇視豫所見三人復有間而人卒不以此置喙豈非終不以文學為職業與北嶽馬公文升為兵書時建言北嶽當祀於山西渾源州之恆山今南祭於曲陽縣者始於李唐飛石之祠而宋地不及北嶽所在故志有恆山飛來之説今京師在北恆山在境內而顧南行以祀北嶽非禮也請改祀於恆山為允事下禮部時倪公嶽為禮書固執志言不可事遂寢馬公嘗語豫倪非以志必可信也其父謙無子嘗遣祀曲陽之北嶽因私禱神求子夜夢嶽神捐旁侍一人與之後遂生倪公因名曰嶽以是渠固執不改祀然舜巡狩所祀北嶽見在渾源州南二十里彼人猶知奉祀而顧可往曲陽縣西一百四十里祭乎殊非禮矣豫因思之信如志所言則亦唐失河朔神不饗而飛至曲陽也宋繼唐而王通無河朔則踵唐而祀於曲陽亦理勢使然也今舜祭之地既在山西而信志言誤矣借曰神在唐宋已飛來則在今日亦必欲飛歸矣抑倪無嗣以姪後官止太子少保為吏書一年遂卒夀止五十有七其祿位名夀視鹽山王公翺三原王公恕有間矣而二公何不聞為神降與或曰倪為吏書有名然二公之名逺出倪上或曰倪以驕侈失之然則為神所降顧為驕侈以纍德而非神所降乃復優焉此殆有不可曉者豫友張御史西銘臨安人也母夢黃鶴入帳生仕終御史舉人劉斗母夢斗降於室中生故名仕終廣西都司幕職此尤有不可曉者郡城永昌城之山曰大保俗呼為寨子山舊城於山下洪武十四年為麓川思倫所屠十六年指揮夀州李觀築今城於山下又築子城於山上日輪兵守之二十三年觀卒指揮胡淵代之始去子城而以觀所築之西面移包於山上蓋淵見京師城包鍾山故也遂盡滅觀之績以為皆已所築故至今亦無碑記率相傳以為淵之績業淵子孫又世官於此故再無知者淵既徙城得寵遂革府為金齒司學亦廢為倉至今招鎮守之禍皆淵作俑也據淵更觀之舊而免輪守之兵既可禦寇防險又使山居城內林木蒼然其績亦不可泯但攘觀之功而無文記又革府為司廢學為倉以貽鎮守之禍其惡亦不可掩而憲副林公俊創立名宦祠於學宫而淵首與焉其亦誤已廢學之人而祀於學何居謂宜别祀於所移之城上斯得已麓夷正統初麓川思任叛屠騰衝據潞江時遣雲南鎮守太傅黔國沭公晟為總兵官左都督方政為左副右都督沭公昂為右副率師討之師至潞江晟以思任幼嘗育於其家決意招之時柵守江者思任黠酋𬗟檢法也已許思任決不容渡矣彼見駐師日久益罵詈無狀政故武將也不勝憤屢請攻之晟不許兵駐久運餉石費三兩師多是政政遂夜率所領兵渡江擊之大敗其衆走緬檢當時謂之飛渡潞江政遂乘勝逐北至上江上江思任所居也政率所領圍其寨不能半而兵晝夜追逐已疲又夷兵救援益衆乃以旗牌取救於晟日數至晟不遣曰我不曽教他去麾下苦言之乃遣一指揮率少兵往指揮隂探晟意紿言至夾象石遇夷兵不可進遂已政知晟決無援意遂復送其子瑛過江瑛與從者攀哭不已政拔劍叱之曰汝急去做將官不死不了遂復過江赴敵夷皆披靡馬躓夷攢刺之為泥時正統四年己未正月四日也麾下盡死有潛江流而逹雲龍州者州夷皆醉之而後以竹索穿其掌送思仁斬之晟聞政死遂焚江上運餉披黑氊雜敗兵歸永昌雲南布政使應履平按察使賴巽以其狀聞於朝朝遣都御史丁某問罪遣行人曹某祭政贈政威逺伯諡忠毅立祠永昌子瑛招魂歸葬郡人哭皆失聲晟駐永昌久聞遣官問罪遂隂遣人告之曰吾為主將凡喪師失律吾皆任之遂發永昌日唯以冷水啖市所賣酥油燒餅行至楚雄遂卒時三月十六日也年七十二事聞朝廷以晟位望素隆嘗闢土安南今又以敬畏國法自殞遂贈晟定逺王諡忠敬尋以子斌請立祠雲南斌卒子琮嗣琮無子嗣遂絶正統九年甲子兵書束鹿王公驥始大征以政故歷升瑛至南河侯瑛無他才技時號方三軟謂頭軟口軟膝軟也當驥為總督偕總兵蔣貴來時政與晟卒已久而文逹李公賢撰古穰雜録謂麓川初叛沭晟尚在彼時只遣人宣布朝廷恩威赦其罪撫安之未必不從遂輕動舉兵又不委晟而另遣將以致王師失利適王振操柄逞忿驥阿其意云云夫麓川初叛晟固在鎮晟為總兵政為左副昂為右副統兵數萬討之在正統三年戊午政死莭上江在己未正月四日晟敗回永昌在正月五六日自永昌回在二月盡卒於楚雄在三月十六日驥總督與貴大征在九年甲子事平在十三年戊辰李為閣老最名有相業極遭際一時國史皆其總裁庶事皆其綜理顧失實至於如此然則後世將安所憑哉良可歎也至論事理大意只以為得地與人無益而勞費萬萬殊不思政以左都督死於夷極慘烈矣欲不興師得乎前以數萬敗於夷矣欲不大興師得乎嘗見楊文貞公士竒作詩送楊即中寧從征大意與李之見同而不敢露又見王吏書作沭忠敬廟碑與李所言同蓋李素敬王而王與楊同朝之見又同一得沐氏子孫隱蔽溢美之狀中其素見遂不復疑李遂據以為真而以其事遷就之而筆於書而不復考也夫振之惡雖不可殫述然其主麓川一事於國體於利害於忠臣義士之寃於久逺之計自今觀之殊為有得不然則歷今七十餘年為中外所壞不知群夷變亂幾畨矣何以能帖然如此嗟乎如楊王李三臣在我朝可指數而於史於事於是非皆顛倒謬誤至終身莫之省改此朱子於撰張魏公碑而深悔只慿渠家草來所以為大賢不可及與巡撫成化丁酉王端毅公恕來巡撫雲南不挈僮僕唯行竈一竹食羅一服無紗羅日給唯豬肉一斤豆腐二塊菜一把醬醋水皆取主家結狀再無所供其告示一欲携家僮隨行恐致子民嗟怨是以不恤衰老單身自來意在潔已奉公豈肯縱人壞事云云人皆録其辭而焚香禮之後公為吏書豫見公衣服飲食雖不侈而亦如常後見公祭兄文有曰昔往撫滇人皆言錢能勢不可犯犯即有大禍惟兄勸從正果遇禍兄以死理雪從是觀之公畏天憫人固非利害所能怵而公兄之賢亦有以助公之氣與志也減字唐劉闢新書傳曰始闢嘗病見問疾者必以手行入其口即裂食之唯盧文若至如平常故益與之厚舊書傳曰初闢嘗病見諸問疾者來皆雙手據地倒行入闢口闢因磔食之唯盧文若至則如平常故尤與文若厚今按雙手據地倒行入闢口共九字手行入其口減去雙據地倒四字乍觀之不知為何説也曷如舊書之明暢乎前輩非之信矣識見司馬公光宋之大儒其所修通鑑如紀武曌黜中宗帝曹氏寇昭烈朱子作綱目已正之矣至於削去留侯迎四皓事以為子挾父夫以為挾父則當載之而論以為戒不為挾則當書以為勸顧從而削去則太子曷從而不廢乎如有疑似削之可也留侯定太子之事漢書屢見如周昌傳亦明言以留侯䇿止顧削以滅其迹可乎又如取李舟言謂天堂無則已有則君子登地獄無則已有則小人入夫天堂地獄之無豈待疑似而述舟見道不真之論以教人是啓之矣朱子謂其氣與理不曽會得恰好處二程每引之終不能上所以識見不真而偏執如此損卯今木工構屋交會之處鑿為損卯殊不曉其義意偶見金史張中孚製小舟數寸不假膠漆而首尾相鈎帶謂之鼓子卯則卯字固載於史矣但二字之名義終不可解藥名蓬藟覆盆子本草各出二條是矣下又引唐本注曰覆盆蓬藟一物異名今注曰蓬藟覆盆之苖覆盆蓬藟之子則全誤矣緣此紛紛議論通不能辨二物惟衍義謂蓬藟非覆盆也自别是一種雖枯敗而枝梗不散又謂覆盆子四五月熟味酸甘外如櫻桃許大軟紅可愛失採則就枝生蛆圖經謂莖葉皆有刺花白子赤黃如彈丸下有莖承之如柿蒂狀三條為是然衍義又謂軟紅可愛則又以蓬藟為覆盆矣蓬藟初熟軟紅覆盆則不紅也殆不如圖經赤黃之得真矣然圖經又謂苖短不盈尺則又非也覆盆樹與苖但不甚髙也衍義又謂長條則又以蓬藟雜之矣覆盆不生條也本經既分為二物是矣下又云一名覆盆子則本經已誤於先矣蓬藟子初則淺紅熟則深紫有芒頗長覆盆子初則黃熟則赤黃芒微蓬藟蔓生條而甚長覆盆樹生枝而不甚髙蓬藟子味甘酸而淡覆盆味甘酸而深蓬藟刺大而稀覆盆刺細而密蓬藟枝梗枯敗而不散覆盆枝葉四時如一只是其子形狀其以津液為味其熟之時皆同本經遂誤陳上良識蓬藟為莓言其形皆是而不能定為蓬藟寇宗奭知覆盆異於蓬藟而又誤以為紅餘注則通無所見矣因據所見辨之使博物者不眩也南園漫録卷二
