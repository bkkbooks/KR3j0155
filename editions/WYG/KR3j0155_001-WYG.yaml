body:
  text: 南園漫録卷一明張志淳撰避諱隨筆謂孟蜀書刻避唐諱以為唐澤逺此恐不然孟蜀初定書多唐時所刻後遂承之不改何唐之澤乎元滅宋後元刻諸史如殷敬恒桓構之類皆諱又如恒字省下一畫至今亦不改凡各布政司鄉試録罔不然豈宋之遺澤至今不忘乎不知為沿襲不明之過反以為唐之遺澤其誤甚矣寧馨寧馨阿堵二語謂為呉人方言復旁證所出可謂博矣但解阿堵為此處亦誤蓋阿堵猶言這箇也寧馨猶言這樣也王文正王文正公不諫天書隨筆譏之是矣至比之張禹孔光不亦過乎彼二人無可稱而為害大王公有可稱而為害小又况二人終身自以為是而王公遺命有不可掩者固難律之於一也引孟子孟子論百里奚隨筆引桞子厚復杜温夫書云所謂乎歟耶哉夫者疑辭也矣耳焉也者决辭也因引孟子論百里奚一章言用助字開闔變化難與温夫言然桞子所云者常也到變化處又不拘此矣觀遷史自當識之江神完顔亮之敗死容齋欲加江神以帝號而湯思退不從至遺恨筆之於書夫亮之敗死以天意言則亮惡已極宋運未改也以人事言則虞允文之功也於江神何與容齋乃欲封江以帝號且言淮河不能如江則眞以人責神矣豈理也哉若神果能佑則前韓世忠大敗金人於金山㝷又大敗於金人然則神何所據乎夫帝主宰之名也天以此理主宰萬物無物可並故曰上帝曰天帝今以四瀆一神而冒天之稱則國之休咎繫乎天者尤大且急而使之下同一瀆之號天豈享乎瀆豈安乎凡人君所為祀神者理當祀也所為祈佑者理當祈也無事如舜之望于山川征伐如武之告于大川是也若責以將帥之出力已失祀禱之理而又曰河與淮不能遏敵然則無虞允文之徃江神自能遏敵乎夫四瀆秩視諸侯在五嶽之下自漢以諸侯為王後遂加四瀆以王號亦諸侯之制也容齋時為近侍又博學能文豈不知此而必欲以帝號加江神推其類不惟昧事神之理其流至使人君不修徳政而溺於求媚鬼神其不為孫皓劉劭者幾希矣殆非小失也當時思退只以四瀆秩不可上同於天抑之是已而未究極於理故不足以破容齋之惑而服其心使如前與之論只告謝江神通不加封亦可也然思退賊檜之黨豈足以語此大扺用兵假力於神多載史冊此皆將兵者巧於倡愚勇之智計初不以告人者而容齋遂以為江神真能死完顏亮真能敗完顔亮而河與淮不能其昧於事神之道甚矣武侯論諸葛武侯於前而引杜子霸氣西南歇雄圖厯數屯結之是已至後論漢士擇所從乃以武侯見昭烈事埒之荀彧和洽髙柔郭嘉趙儼邢顒呂範周瑜之間夫三往方見自三代而下唯武侯一人而乃㮣等諸魏呉隨時求用之士且又若武侯有心先事昭烈以為自謀者何其悖也官制論真宗始創學士以下職名自觀文殿大學士至直秘閣㡬四十種非若前代之冗泛夫官之冗泛莫過於宋凡立言立論於本朝之失不言之可也婉言之亦可也顧謂過於前代不幾於欺誣乎若移此以稱我朝之官制則無閒然矣無何論爰盎傳日飲無何只引師古曰無何更無餘事也又引盎傳毋苛言南方不宜多飲又淮安王傳無何注以為再無别事皆因上文為義則無何通無發明蓋無何猶言無幾也今人作文亦言無何猶云少間也言日飲酒不治其事少間則又勸之曰毋反而已蓋究吴反事必致禍於盎不勸其無反亦致禍故也如此解為得若楊鐡崖補日飲無何辭只據盎傳解亦不察耳論兵論靖康之禍中外兵數十萬不聞有如蜀燕晉之憤哭者以為氣運使然此尤非確論蓋自武侯治蜀繼以蔣琬費偉輩朝之正氣公心未嘗改燕晉創業日淺其先之風揆亦未盡喪故士卒如是若宋自哲宗用小人而加以徽宗乆乎位養成一種無恥無義憸邪姦佞嗜利私己之人通在顯位而擯斥正直忠良殆盡再加以蔡京童貫之虐朝之公論士之正氣民之恒心銷磨盡矣此何預世運邪後之君天下者深警乎此謀人國者深念乎此則自不各顧其私而惡直醜正以養成一代之禍至於民無憤哭而無可救藥矣彼小人方溺其私而不肯少念及此而容齋又委之世運以助其無所忌憚之心其關係豈小小哉和詩論古人和詩必盡其意非若後世為次韻所拘予以為盡意與否在作者非次韻所能拘也去年宗伯喬公宇寄予一絶云六詔山川萬里餘三年踪跡歎離居題詩為問南園叟應了人間未著書予次荅二十絶詩雖不工然所以荅其意者却未嘗以韻拘而有不盡也漫録於左竹帛分排萬卷餘便堪瀟洒送諸居追遷述桞能無意只恐人疑是謗書老來無復計三餘日日昬昬兀兀居天下已多投閤誚子雲何羡太𤣥書身名瓦裂更無餘獨有青山是舊居除却南華經一卷案頭抛盡向來書灌園心事外無餘寂寞柴門傍水居却有誇張杜陵處手持厚禄故人書江左衣冠望乆餘巖瞻旦夕待君居定知還有山翁信莫怪渾無宰相書餘多不録勲階文官一品勲階自光禄大夫柱國以上不許請授制載諸司職掌明甚成化中閣老眉山萬公安一考滿始封吏部請給時濟南尹公旻以太子太傅為吏書将滿遂創為萬請而循之至三原王公恕以太子太保為吏書滿三載僉意公必矯前弊今南吏書安陸孫公交為員外郎受王公知最深將伺隙言之見有工刻柱國圖書遂止後四明屠公滽以太子太傅為吏書皆自請給再不可正時鈞陽馬公文升以少傅兼太子太傅為兵書考滿當給屠馬不協固執以唯内閣與吏部有請給之例兵部不當請益無謂矣馬乃言之於内斯給焉法守一壞其流至此辨姦容齋辨張天覺姦人之雄而䝉賢者之名只以蔡京不相能之故近𢎞治正徳之間大臣有姦深無文誤為内寺所惡或又有承弊政之後輙能矯飾遂得賢名美謚以盡掩其平生之實者酷似之不知後世寧復有容齋之見否也惜才三原王公為吏書時天台夏進士鍭放回違限例當送刑部問罪鍭以為母不服且以詩風貢郎中欽欽不懌時予為主事欽據法白公必欲送問鍭急因言曰必欲問有死而已鍭嘗以所為文獻公公因停其事命予勸鍭鍭曰果不可免則以進士還官長歸養母而已予因解之曰子節誠高矣然已中進士則不比隱者可行其志今公惜才好文乃如是故遣某相告果不服而長歸任子歸矣則據法行浙江廵按御史下縣提子顧不驚令堂乎夏遂語塞還以白公公喜見顔色即遣官持手本引鍭送刑部又丁寧所遣官善慰諭之及官回又召予引官面問曰鍭去云何曰送至刑部門外鍭發嘆而易衣進矣公微笑曰汝在道還使之衣冠乘馬否官曰然公又微笑謂予曰此少年有文而不知法故當委曲成之公於一進士而愛惜保䕶之如此而法則不少屈也可謂難矣署門公為吏書署於門曰宋人有言有任於朝者以饋及門為耻受任於外者以包苴入都為羞今動曰贄儀贄儀而不羞於入我寧不自耻哉一時帖然無異議者使非真誠積乆而孚自不敢書書之適足以憎多口矣予目擊為吏書者先後凡幾人矣竟不敢署門如此亦各自知也論將容齋謂紹興七年淮西大帥劉少師罷岳少保以母憂去官累辭起復之命朝廷用呂尚書張淵道掌其軍岳在九江憂兵柄一失不容再得亟兼程至郢有㫖復故任而召淵道為樞宻都承㫖予考齊東野語記淮西之事甚悉詞意與此全不同宋史論斷亦謂淮西之舉岳飛在營張浚惡飛聴其歸終母喪而不能留今謂岳憂兵柄一失不容再得則觀岳應張之言足眀其本心豈有憂兵柄一失不容再得之念又朱子亦曰岳亦横終恐難制汪浮溪藻與容齋同時其言亦概岳於張浚而不别白又㮣謂之齷齪常才又獨言岳軍中游手竄名而廪者最多夫朱子之論岳多得之張敬夫敬夫之言多得之於父浚宜無恠者然觀朱子以只慿渠家文字草成張魏公行事與他書所記多不同為恨則大賢之改過不吝可類推已至如容齋與汪所言則何恠髙宗中無所主而賊檜之敢於殺岳乎以岳之忠誠才猷據後世事定後觀之誠所謂天下之竒才豪傑無間言者而當時洪汪皆列侍從有名猶所云若是後數十年朱子猶所云若是則君子一時不值明君而欲人盡知其藴而不寃且欲一時是非之必定難也廟額予郡有漢夀亭侯廟宇甚莊重成化辛丑有鎮守太監命撤之而更以武安王廟盖内寺不知前代名臣皆題其故封乃洪武初定五岳四凟為神之闕詔格也據法與理再不容有所更今天下皆然不惟不能正而亦不知所自矣又漢夀為亭名新安程學士敏政已辨之但不知劉宋時亦有漢夀之封可證也取蜀容齋言取蜀將帥多不利如洪武中伐蜀取偽夏廖公永忠功獨茂其後亦以服龍鳯衣抵死子孫無聞亦可證矣但云凡割據於蜀者不過一傳再傳考之晉書自李特據蜀傳子雄雄以兄子班為太子雄子越弑班立雄第四子期驤子夀又殺期自立夀死子勢立降晉凡六世四十六年乃亡却不止一再傳也冉子程子謂論語成於有子曽子之門人故其書獨二子以子稱然冉有稱冉子退朝冉子為其母請粟凡两稱冉子則不獨二子以子稱矣鉛錫嘗見本草謂粉為錫粉又名定粉即今婦女傅面之粉也此粉燒鉛所成錫為五金之賊只可為噐皿不可為粉不知何以名錫粉後見周禮金有六齊以金六錫一為鍾鼎之齊以金錫半為鑒燧之齊注謂錫多則刃明故諸齊皆以錫和之故鑒燧金錫相半今觀古鑒多清白信矣然錫絶不可和金亦不可為粉乃知古之錫即今之鉛也但錫山之名已乆何以不名為鉛而名錫然江西有鉛山縣又何以鉛名乎誌謂周秦間曽産鉛錫則鉛與錫固通名也韻書亦稱鉛為黒錫則鉛為錫明矣然鍾鼎斧斤戈㦸大刃削殺矢鑒燧皆和以鉛則防其挫折易虧缺用其堅韌不脆用其照物明白所謂金性堅剛錫性柔與金或赤黒錫則青白也然則古謂鉛為錫今則鉛自鉛錫自錫耳元年春秋論元年之義而推及乾元坤元紀元日稱元祀人君體元宰相調元備矣近觀歐陽永叔以元無他義意亦甚異之偶見擲骰子者謂一為么又見朱子大學章句謂一為首中庸章句又謂一為一若以元年之義例之則訓首者又當别為訓而有他義乎從是言之則歐説亦或有所見也笑語太監錢能女真人兄弟四人俱有寵成化間能號三錢來鎮雲南其怙寵驕蹇貪滛侈虐古所未有不能悉記有二事最可資笑語者雲南有一富翁病􅋪其子頗孝則執其子曰汝父癩傳於軍士不便且又老矣今将沉於滇池其子出厚資乃免又王生者業賣㯽榔致富人呼為㯽榔王家則執其人曰汝庻民也敢惑衆僣號二字王復出所有方免後繼之者雖貪求無厭聞斯事未嘗不為發笑也能後雖挑釁安南三原王端毅公挫其虐然尋復守備南京𢎞治末老死京師不識天道何在或言其㓜畜錢寕於滇晚俾專鎻鑰能病寕利其所有遂進毒於能而死寕初名福寕児者是也本李廵檢之家生子然則能之報亦不為無也南園漫録卷一
