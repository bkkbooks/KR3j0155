body:
  text: 南園漫録卷四明張志淳撰字誤雚音桓荻也見前漢書貨殖傳今程文避諱於權字盡去木是雚字矣其可乎要惟省木之㸃斯可矣子西朱子註問子西曰彼哉彼哉謂子西卒召白公以致禍亂按史記白公勝太子建之子平王之嫡長孫也建為費無忌誘平王奪其妻而欲殺之故出奔勝時又未有罪校之昭王之生其出尤正子西既遜昭王而立以為君則召白公亦天理之難冺又恐其在吴為楚患也此不足為子西病乃以此為孔子所外恐未然若只以其不能革楚之僣王又納鄭賂為之起兵以致白公仇之而作亂事理豈不實子西豈可辭乎繆謚古君臣多有繆謚按謚法名與實爽曰繆然秦繆公稱五伯何以謚繆史記䝉毅謂殺三良以從死退百里奚非其罪故號曰繆公又宋改謚秦檜曰繆醜則繆為惡謚明矣然漢昭烈謚張翼徳曰桓謚關雲長曰壮繆則固以繆為羙矣若惡謚昭烈為之伐吴不可諌止關之忠勇盖世昭烈肯以加之乎在宋之先晉秦秀欲以繆醜謚何曽而武帝不從則以繆為惡又不止宋矣或古者假借以繆為穆歟然謚法穆繆各具固不俟假借也今人書或書秦穆或書秦繆竟不可辨論賢史綱論劉静脩不仕元與其退齋記之譏許衡仕元義最明正至以静脩作渡江賦為幸元滅宋且謂劉生長燕北為見聞習染所局如盧摯之徒謂宋為淮夷此殊不知静脩矣觀静脩詩有云世人遥指降王道好似周家七嵗児又云都無三百年間事寡婦孤児又被欺則其非宋取國之不義已有素矣此渡江賦之根抵也𢎞治中刑部潘員外府作孔子通紀後紀而及於静脩亦以過江賦為疑遂與内江劉檢討瑞計以為静脩必别有所見而不能剖劉以問志淳曰此何難剖之有劉異而求其説曰静脩之莭决不肯茍於出䖏故退齋之記作静脩之見尤不足篡周之宋故過江之賦成此其識見精峻造詣純㓗可與夷齊伯仲邱窺見其一而妄擬之固非矣潘不得其道而委於不可知不亦誤乎劉謂有史筆而惜潘不及聞此云桂辨桂有桂樹之桂有桂花之桂桂樹則楚辭桂酒箘桂之類即今醫家所用取其氣味辛甘乃用其皮也桂花之桂則詩詞所言今人家所植取其香氣馥烈乃尚其花也今類書載桂通不别白雖白孔六帖亦然劉豫劉豫遷汴與民約曰自今不用宦官則當徽宗任童貫李彦楊戩之時所以取怨於民者深矣豫以進士叛逆絶似劉闢闢即敗㓕而豫卒僣天子善終保首領不惟豫有金人之恃其才亦優於闢矣視其與民約者可見肅政扁水東日記載都察院堂中扁肅政二字謂前元有此號建文中亦有此銜號當撤去夫仍前元之號者如㤙榮宴如各藩稱省之類不一矣又建文中亦有此號何其過耶以葉文莊之賢去建文已乆而言猶若是則又無怪蹇忠定建言當時也同年楊主事循吉既致仕嘗遣子奏復建文帝號當時孝廟亦不之罪則聖徳明睿廣大與葉之見天淵矣然觀葉載太監沭敬之事又與此異無乃一時未之思耶班史班固漢書與史記不同已有史漢同異及容齋亦間言之矣偶觀季布傳曹邱生云楚人諺曰得黄金百觔不如得季布一諾此即當時語無容易者班書减觔一二字遂使文義全萎豈直新唐書之病乎穢言張綵為即中時常言父子之性非正其原只為求女色之樂毎聞之殆欲掩耳近觀孔融傳載路粹誣奏孔融與禰衡言父子無親只為情慾則悖理傷道之論前固有之矣巾幘曹操欲殺孔融令路粹奏融禿巾㣲行註謂不加幘也則巾幘之辨已可見矣又謝安傳桓温詣安值安理髪乆而方罷使取幘温見留之曰着㡌進其重如此今制皆用網巾則秃巾之推也吏𨽻生員齊民於上各加巾私則加小㡌又加大㡌則幘之推也温使著㡌進而免其戴幘則幘固如今之烏紗㡌而㡌固如今之大㡌小㡌盖欲便之不用禮服而以為重安也珠履客今人多言珠履客三千至白帖所載亦然按史平原君客三千其上客皆躡珠履則珠履乃三千客中之上客方躡非三千客盡躡也詔語今世承宋儒之説若謂宋以前無深知義理深知義理皆自宋始者夫宋儒論義理誠精然以今日踵其説而漫無真知者觀之却去前逺甚嘗見漢人詔中多精不暇一一只如成帝制東平王傳相曰夫人之性皆有五常及其少長耳目牽於嗜欲故五常錯而邪心作情亂其性利勝其義此數語於性情義利處何其精深明白也恐非後世詞臣所及狐媚狐之惑人載於雜説家明矣永昌有施姓子以丹青為業年十七時以元宵看燈囬遇一婦人極艶羙施誘之至家遂昏惑其父母遍延諸術家莫能治或教以群犬逐之遂絶嘗面詢其人則曰彼婦雖黒夜視之而形容光艶其見當時自不悟也然其人年七十餘矣至今無他惡符金完顔亮之弑逆亂倫好殺嘉兵矯偽沉湎冐色與隋楊廣同後舉中國而被害於揚州又同其享國與年夀大約又同其得謚又同而遺臭後世又同天理昭然莫此為甚可以為君人者之炯戒也註書誤論君子無所争必也射乎朱子以唯於射而後有争解必也射乎盖以决辭為義而属上句矣及何事於仁必也聖乎朱子又以疑而未定解必也聖乎而属下句矣二句皆孔子之言文義氣脉皆同若通作疑而未定解於理豈不尤順於孔子當時之辭氣豈不暢乎况此二解又非引言而皆出朱子而前後頓異良不可曉或謂朱子不可妄意則寕失孔子本意而狥朱子可乎夫孔子聖也朱子賢也賢者不免有時而誤又何疑哉觀朱子於程張亦辨其非主於理之是而已僣稱公春秋時晉鄭齊衛皆以侯僣稱公春秋則書其實魯亦以侯僣稱公春秋則仍其舊胡氏以為臣子之詞是已獨宋以公爵而未嘗少僣竟無人表其實何也至偃方僣王不乆即㓕於齊矣宦官名周宦官閹人寺人其職也秦始有中車府令漢唐因之而中謁者中常侍中尉類以中字名其官矣洪武初只以監正監副監丞名門正門副名永樂初始改監正曰太監夫天子之三公方曰太再上而天子之元子又上而天子之親乃以太稱今中人之職亦曰太其視漢唐宋止以中名者却盛矣然漢唐宋至有封王侯将相之名者則視我朝存沒止於太監者又逺矣使再不以太監家人弟姪為侯為伯為錦衣官則前代更不可及矣洪武之制豈不冠今古哉薦賢華容劉東山公為兵書時極意薦才於是群趨競進時張綵為稽勲員外郎欲求越次之舉又值北人火篩張甚遂以談兵動劉劉極推許間以語志淳因素知綵之大姦險無學術貪財好色好亂而談兵亦妄也頗謂不然劉遽曰吾無才而居此故急於取才耳對以就才之中湏少有行檢若通無行恐才不可獨任劉不懌後竟以僉都御史薦時泌陽焦公芳為吏書而吴郡王公鏊為吏侍靈寳許公進初為兵書焦亦才綵而王許固不可乃止而綵怨予特甚及綵再附劉瑾起為文選即中無何升僉都御史即轉吏侍予遂有南都之行後綵伏誅語猶不置予君子之難於知人小人之深於報怨言語之不可不宻三事皆可為戒也評畵世多畵七賢過關圖不知七賢為誰各載其説按陶靖莭集聖賢群輔録魏嘉平中阮籍嵇康山濤劉伶阮咸向秀王戎並居河内共為竹林之逰世號七賢袁宏戴逵為傳孫統為賛又七人仕晉皆有名則必是此七人矣且圖一人騎牛則河内多有此而晉人多乘牛亦屢見於别書也宻詞桯史載宋徽宗玉虗宻詞而引禹湯罪已以興終之又按蔡絛國史後補具載徽宗教門尊號及唐武宗㑹昌投龍文稱號此最善學遷史為武帝紀意為君至敗國矣而信尚猶若此則終無時而改悟矣其必為囚擄何疑奏减𨽻莆田彭公韶為吏侍時人不見其笑容殆可比宋包拯及遷刑書遂奏减百官柴薪皂𨽻之半朝士為一諠以為今俸不實支校前代已薄所仰給者在此而欲逓减其何以養廉事下兵部兵書馬公奏不可减遂如舊僉謂彭治書老不識既富方榖一句詢其由盖欲論内臣一二事故言此以示無偏曽不知即此而并其素望亦損不特掩其論内臣之羙意也大臣行其所無事不當容心如此交阯交阯唐堯宅之漢州之逮吴割據亦然宋不競始失迄元之强大竟不能郡縣之如漢也雲南漢不能通至唐妻以公主至三圍成都抗衡中國然今卒為郡縣説者謂元兵由西域出大理後故地勢順下雲南而我朝開拓以之是已然元剗厓山屠閩廣因稱兵交阯勢亦無不順矣而竟不能有之何耶我朝永樂初破交阯立布政司以復漢舊偉矣尋又棄為外國豈地合散自有數耶抑人謀之不臧也郡中一指揮調自交阯歴三世而家之明珠獨異等伍則凢所以失交阯之民心而再不可取者其以是耶洪熈宣徳間既棄交阯矣至𢎞治初莆田彭公詔撰名臣録亦述當時之説以賛大臣之功此譬諸人家父祖遺有田土為强竊所占其家幹度一時力難争因棄之以省訟妨業可矣頋張之以為功無乃不可乎以交阯之勢校之雲南則沭昭靖王張吏書之功深且廣矣洒削史記貨殖傳洒削薄技也而郅氏鼎食漢書音義以洒削為治刀劍名索隐以洒削為磨刀以水洒之又方言劍削關東謂之削音肖按周禮六齊五分其金而錫居二謂之削殺矢之齊又曰魯之削又曰築氏為削長尺愽十合六而成規欲新而無窮敝盡而無惡鄭注曰削今之書刀也又注曰古人未有紙筆以刀雕字謂之書刀亦如筆也别注解削極明亦以雕字之説為不通而引子張書諸紳為證則削為書刀為削竹簡之用無疑矣但洒注為以水洒之雖近而事義終欠明周禮注者以為加純鋼使鋒利若今之剃髪刀於事理是已然鋼乃錬鐡之精為之非錫也以為錫即今之鉛然鉛體柔又非鋼之利也且五分其金而鍚居二為削與殺矢之齊金錫半為鍳燧之齊則五分其鐡而鉛居二又何以能鋒利乎鉛可名錫古字同也鉛為純鋼又非事理所有此殊不可曉意洒字有淬厲之義而非只以水洒之也則音義與索隐所解雖近是而皆未䆒極二字之義史易字舊唐書崔𦙍傳言𦙍制衣帶手書以通意於孫徳昭其詞緩新書作斬帶為誓其語急誠使有據則可矣不然何從以制衣帶為斬以通意為誓哉語言輕重在詞臣此劉静脩之所嘆也光武漢光武於兄縯㤙禮極薄盖始謀者縯也結豪傑者縯也創洪業者縯也其見殺於更始而不哭有以也及即帝位謂宜首加縯封而褒示天下然後封其二子可也顧遲廻至建武十五年始因對諸子而贈為公又至十七年公皆進王而始贈為王觀㓂恂勸耿况不奉王郎亦曰昔王莽時所難獨有伯升焉今大司馬劉公伯升之弟可扳附也况遂奉光武則縯之功澤亦自可見而遲録其功又絶無特異昭宣之典至於劉盆子之兄恭殺於劉輔遂為之補王侯賔客坐死數千人朱鮪等殺縯及降竟不行殺縯之罪夫恭之功之親視縯何啻百十何於恭之仇報之如彼而於縯之仇忘之如此律以兄弟之仇不反兵而闘之經則光武薄於兄之㤙義甚矣而後世通不論及漆齒新唐書南詔傳曰茫君號也永昌南有茫天連茫鮓茫施皆樓居無城郭有漆齒金齒銀齒三種夷見人以漆及鏤金銀餙齒寝食則去之今芒市長官司去郡四百餘里皆大伯夷也多以酸石榴皮及藥染齒使黒初無金銀鏤餙者又漆齒既黒亦無寝食脱去之理黒齒則信然謂之漆謂之為餙見人寝食脱去皆妄傳也中人敝唐代宗時李寳臣攻田承嗣垂亡代宗遣中人馮希倩勞寳臣寳臣歸絹百匹希倩抵之不為禮致寳臣貳與承嗣和後承嗣復猖天子竟不知也終之唐室㓕藩鎮之手豈一朝一夕之敝乎南園漫録卷四
