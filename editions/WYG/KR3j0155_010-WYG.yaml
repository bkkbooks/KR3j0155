body:
  text: 南園漫録卷十明張志淳撰大寺碑郡城西北五里許俗名大寺山寺廢無孑遺矣成化𢎞治間掘得其碑甚宏麗然皆闕其所載碑隂常住田畆財貨之繁恐鎮守者因而生事輙碎之近復得一小碑予因使全之遂得觀焉寺盖蘇氏所建也文雖不足觀而可證永昌之為郡在元已盛且與金齒夷之地逈絶無相渉而景㤗間所脩新誌皆匿舊誌以荒其地而故侈胡淵之功也然藉此又可見當時貨財之殷非今日可及而蘇氏施財以求福利者今澌㓕已乆則事佛果何益哉是皆可以垂戒而舊誌謂郡城盡夷於思倫者正燬寺之時也因備録於左其文曰天地以生育萬物為心釋氏以慈悲衆生為念盖生生不息天地造化生物之仁也化現無方我佛慈悲􅂆善之法也天地生萬物未嘗責報於萬物佛憫衆生亦曷嘗求報於衆生哉人茍有善為造物者必豊其報而厚其生也於􅃧盛哉西方大聖人之教不治而不亂無想亦無欲所以見性真而成道速化俗易而感人深雲南自開闢以來上而唐虞三代之寛下而秦漢歴朝之盛非所有也諸葛孔明五月渡瀘深入不毛南方始定歴晉隋唐而下非中國所及也皇元混一區宇治隆古昔際天極地莫不來庭癸丑年世祖皇帝御駕統兵由西畨道深入大理時段氏以山河之固據其域見天威莫測遂率其部以降而雲南六詔悉平厥後委命大臣烏蘭哈達首整其緒繼遣平章賽音迪延齊紛理其科民遂生而樂業者迨今七十餘年矣永昌乃大理名郡實孔明過化之地東距闍黎八百媳婦之界南靠金齒伯夷緬國之疆西鄰吐畨西天之域北接洱水滇海之涯重鎮地也距城西北五里有古栖賢梵刹曩因兵火廢為荆棘土㞐之望有蘇氏而慶名者其先智隆賛段氏降始授永昌千户管民之職以供給征捕建都歿於王事子慶繼襲其業累遷民職多歴邉功敬奉梁王令㫖授同知鎮康路軍民捴管府事撫治邉夷既滿且代遂恬退閑處灰心利禄樂善好施念國家生厚之㤙祖宗栽培之徳将何以報之繇是於延祐甲寅之元大捐已資復建栖賢夷棘除礫命工輪材首建闕殿奉大日遍照如來左右廊廡僧寮齋㕔庖廪門術百堵作焉鐘鼓有樓經典有匱舍已田貳拾肆䨇捐真􅖝叁千餘索以充常住放良驅肆人以為洒掃繼脩後殿以奉藥師佛作無量夀觀世音各一千像餙目全金繪壹百捌觀音白蓮海㑹東方世界主八大佛母壹陸天帝釋主者八大明王十二宫神摩訶迦羅七轉天神塑粧壹拾陸羅漢鎮殿四天王左右明王像畵五十三叅海㑹八大菩薩五百羅漢十二神王三界一切靈享印造華嚴經八十卷般若經六百卷諸品名經一千餘部泰定甲子嵗作浮圖一十叁級於紺殿之前髙一十五丈有竒前後殿堂金碧彩絢凢寺之供具一應用度莫不備焉落成又念永昌為太皇太后湯浴邑蘓氏具建作之由献以充官上為皇家祝延聖夀下為人民祈禱福田有司以聞奉帝即法㫖省府榜文特為加䕶扁顔曰報㤙盖佛之化人也易而此邦且近佛國故信之深而思之至也㑹余以蜀鄉貢泮永昌釋道惠求言以傳不朽余嘉其闕之勝也左挾釋迦補陀之聖跡右腋龍泉雞足之名山後倚西山千仭之翠屏前對東山富樂之秀巘俯視一川之勝森羅萬状之雄真永昌佳境蘇氏捨數萬緍修寺以報本捐已而歸官則三心五願六念十善盡在是耳茍非其心洞識幻化疇克爾耶吁齊景公發一善言熒惑為退三舍王晉公庭植三槐子孫位至三公是造物者不責報於人而豐報於人也東坡銘三槐堂曰王氏之福盖未艾也余於蘇氏曰積善之家必有餘慶乃識其始未而作偈云釋氏教𢎞逺幻也大鑪鞴利鈍歸陶鎔無在無不在充塞天地間其大竟無外歸而感諸宻須彌等一芥善哉蘇氏慶灼然了三昧亟猛捐嚢金建諸天法界上以報君親下而覺盲瞶懋績鑱堅珉永刼長不壞㤗定三年嵗丙寅七月既望永昌府儒學教授華隂楊森記濮陽度金秀書承事郎同知永昌府事汴京張埜先篆功徳主蘇慶弟蘇祜蘇祥男逹海天祥松夀相夀椿夀天定姪世昌明安答耳山夀蘇恭住山釋道惠等立石其篆額云棲賢山報㤙梵刹記其帝師皆髙一字與梁王同於此不獨見前元之重佛而藩王能授人以官如此而官誌之不足據亦已甚矣閣老邱公濬學士程公敏政動曰正史可據然則永昌立學曰金齒司儒學自正統丙寅至今如吏書王公直學士王公英為記為詩又如兵書王公驥刑侍楊公寧軰皆居此日乆何通不及金齒非永昌學校元設已乆乎夫以一指揮之勢能使蔽惑至今士十餘年上下無敢言者顧謂宋太宗之事與夫天下之廣唯正史官書是信可乎故不厭其繁而録之以見正史官誌之不可盡信亦非曰誑誕小説家為可取特在公是公非用意考尋而識見筆力無與已私則得之矣豈可獨以官史為真以某逹官名臣不論而盡枉其人與事乎儉徳沭忠敬王晟初征麓川時駐永昌乆嘗以布汗衫二命一指揮浣補指揮浣補畢則再以細布如其製成之以上沭顧笑曰汝以我為無此耶但不可以侈自奉耳所謂不欲折福者以此遂却之故當時皆服其儉徳天理聖賢之言只論理理原於天故曰天理理具於人之性故曰性理理各有所宜故曰義理理皆見於事故曰事理理在於治民故曰治理天地惟有此理故能成一個天地天地中惟人全備此理故能叅天地然這個皆資氣而行氣有駁雜故天道福善禍滛之理不能盡其本然人性有善無惡之理不能全其一二只憑氣使以自私自便如世上大惡與出世之所謂仙與佛千端萬種清濁髙下皆是自私自便而已聖如二帝三王孔子其理不駁雜於氣已賢如伊傅顔曽思孟其理㣲有駁雜於氣已矣人於此理强半自主乎氣而失之却獨於天之福禍責以全盡而不雜於氣豈不誤哉予毎見古今善惡之報紕繆差舛有不可言者故思其原如此知乎此則勢利人謀得䘮之際又不足言而惟自盡於理而已矣故覺唐人論天者通是溺氣之私以自便利之説也不獨唐人論天今有司求雨暘時若於天者抑不思天所以賦與已與百姓之理可曽盡一二而責天必不少違豈非愚乎服善吏書河南耿公裕嘗曰吾為禮書時暮自部歸必經過王三原之門過必見其老蒼頭持秤買油於門首因自念入官至今初不知買油㸃也故毎過輙靣城墻而行盖愧之也時耿公方代王公為吏書而心服王公如此可謂賢已志淳為吏部主事時親見公子自三原來省公只如商旅騎一騾而已有司驛逓何從奉之又見公女適宋監生者出只乗市井所顧两人小轎嘗以銀二两託雲南張鳯儀知印買寳石叮嚀切勿使公知暨正徳元二為吏書家首餙皆雲南所造寳石皆比勲戚而更過之矣揆厥從來何以闖王公之藩籬乎戍魁國朝大魁前甲戍張信無聞丙戍林環戊戍李騏庚戍林震皆終脩撰壬戍劉儼終禮侍後甲戍孫賢終太常卿兼學士丙戌羅倫終脩撰戊戍曽彦終太常卿兼侍讀庚戍錢福壬戌康海皆終脩撰今甲戍唐臯聞亦老矣凡戍魁無一人至台輔豈有数耶然如羅公之道髙一世名聞四海則氣數固不能以勝理矣有子論語首篇載孔子之言次即有子次乃曽子則當時門人之見固已先有子而後曽子矣再以記與孟子所載證之則有子於道亦深矣借以曽子得斯道之傳先之校之諸子不猶賢乎校之宰我不尤賢乎今乃以宰我為哲配享殿上以有子列於廡下原其初只以四科無有子故也然四科只以從陳蔡之難者言之故曽子不與而特列四配顧於有子不究其賢與其不與難而使之後宰我可乎今以二子言行論之百姓足君孰與不足視使民戰栗之對孝弟為仁之本視短䘮之問其他如問䘮之足以服曾子之類視晝寢與從人於井争寵於齊者相去甚逺謂宜升有子於哲以配享易宰我於廡以從祀斯義為允而卒無知求其實者可慨也夫老兒當正徳初内臣最寵狎者入老兒當當字作去聲讀猶等軰也然實不計老少唯寵狎是尊京師稱勢燄可畏者輙曰是當裏的元順帝元順帝為宋瀛國子詳見庚申外紀而旁證於元史明宗素謂非其子之説與余應之詩歌皆有據依矣予嘗見袁桞庒子忠徹所著符臺外集言䝉詔見遍出宋元諸君之遺像俾觀之親奉聖諭曰宋自藝祖以下諸帝何皆清癯似太醫然及觀元諸君曰何皆状碩乃爾此都是喫大羊尾子的至順帝忽曰此何以獨清癯似太醫也忠徹不能對後見他書與元人詩歌方悔恨不能多知而舉以應詔以増表聖鍳之精因記之袁之說甚詳予不能悉記然即此可見順帝為瀛國公子無疑矣史綱乃一切不信甚至史以秦政為吕不韋子則曰漢人之謗也呆齋論宋太宗之事則又曰元人何不言也自相抵牾盖不可曉嘗舉以問同年蕪湖李布政賛答曰子未嘗親炙邱公公志髙天下而學􅀶才贍勵名莭然家庭之間不免私嬖婢僕之累故其為書盡黜前代隐事以自掩如文宗代明宗之事史綱亦曲為之辨云觀史漢髙統重兵首入秦宫見珍寳美女之盛欲留居之聞留侯諌即還軍㶚上過陳留時時問邑中賢士夫好酒及色嫚罵惡儒之人如此盖㡬乎敷求哲人改過不吝者矣而觀史者不及之詩文傳嘗見出像千家詩古文珍寳二書其所選詩文混雜髙下於深處通無所見然自予七八嵗時見之至今板刻益新所傳益廣而好之日益多豈以淺近故耶而古詩文之不傳者何限也友義予郡有符丁二姓相友善丁後病而有子支蔓不事生産丁乃以白金若干託符曰子支蔓不事生産身後恐即耗煩為宻收而訓使治生改則畀之不可改則君之物矣符許諾日過其子告以其父命之篤子稍改悟曰恨無資以營生計符許借之借而叩之果不費則勗之焉踰時再詢而叩之曰恨少耳若多假焉生彌遂矣則再借之如是者三子曰若得若干業可成矣符知其可也則曰汝當具牲醴來吾為汝轉假其子如命徃符則以其牲醴置丁之靈几前為文告曰君不鄙予託予以子而委我以財今君子克家矣財凢若干两盡以付君子君可以無慮矣遂歸時丁頗裕而符更窶財不相負不足論而又能忠誨其子俾有成可謂難矣郡人盡能道其事然八十年求近似此者何嘗聞耶又可為世道嘆也􅃡甸嘗聞郡人使􅃡者言其宣慰自尊使者授毡如古之䨇膝着地而坐靣之其下亦然盖即其俗之跪也其自稱曰􅃡王其夷語所常稱則以朝廷為兄也與木邦宣慰孟養土官殊不同竊思􅃡雖狡詐然力弱惟水是恃而不能攻勢比木邦孟飬為劣問之使人云不如是彼即不供給夜或隂害所以如是屈於彼也近因觀元史乃知命為􅃡王待之過厚皆始於元使如我朝首使之為宣慰司豈敢如是乎因地逺而元人又急於服逺而過視之也否㤗録初讀否㤗録見所著述甚羙後讀天順改元詔與録所述又絶均出詞臣之手代言之職而於朝廷昭示天下萬世者乃如此則紀事得實豈易也哉倭國元史載元世祖欲通倭國詞恭意勤自至元二年至二十三年或婉其詞或加之兵使臣被害軍士被䧟倭竟不至夫倭自漢魏晉宋隋唐開元貞元中宋雍熈後皆來朝貢論强大則魏晉及唐宋豈能逮元而倭顧朝貢於彼而絶於此雖夷類狡狂或者彼亦不願服從乎元也不然聖朝自洪武至今何朝貢有常而無間乎當時許衡􅂆元示之以寛不識能推原及此否倘推及於此則宜其仕元之不能自安也用妓女張世南宦逰紀聞載黄銖與朱子友善銖毋為詞之序云力脩寳學賢表宴胡明仲侍郎遣歌妓來乞詞則明仲在當時宴皆用妓然張思叔在程門屬意於妓曰不害道胡邦衡志莭猶溺於妓則宋制不如今逺矣顧人才益劣何耶南園漫録卷十
