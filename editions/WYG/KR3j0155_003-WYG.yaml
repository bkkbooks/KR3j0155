body:
  text: 南園漫録卷三明張志淳撰武帝意田蚣竇嬰􅈅夫之事武帝令嬰於東朝廷辯之意已有在使汲黯鄭當時就韓安國之論而執之曰夫當罪不當誅當罪罪其暴横不當誅推其孝勇宥其酒失如此執之以復武帝得人任其斷自可以復太后而免夫之誅矣若疑如此恐太后怒怒亦武帝可據廷臣以為辭而解之矣觀其怒一時之不敢言曰吾并斬若属是一時之臣不能深探武帝㣲意而不肯任怨也卒之太后不食而并嬰誅之是乃群臣成夫嬰之誅耳當時固不足論也以汲之勁直而持亦不堅惜哉觀史當如是則武帝奉母之私英明之見不俟欲族田蚡已可見矣又安國之既廢以五百金餽蚡得之安國之説固有持两端以隂右蚡之意矣太史公於此不及而於安國傳始發其隐此其所以為良史與而觀者至今不解此意亦猶汲鄭之不解武帝意也樹松大保山北多樹而髙南無樹而低天順初武功伯徐公有貞安置於此謂守臣曰若南樹以松使與北平當有官於朝者守臣如其言至成化𢎞治間士果有官於朝者事異郡東南七十里曰施甸長官司者舊廣夷州也地有名織毛嘴者有眢井深窅莫測見者毛聳𢎞治戊午冬有荘指揮逐捕縱一鶻摶雉雉入井鶻随雉入荘命左右尾之至井鶻雉復騰起而聞井中嗚嗚有聲衆疑為鬼也則隐隐如人以白荘荘命引䋲下曵之則一婦人遍體衣觸風皆碎而氣息僅存徐飼以粥飲逾日始能言曰奴姓張氏大理人也從夫楊拱貨易於施甸夫姦其叔母情好甚篤因紿以歸寕至此則束縳手足共推入井中尋下大石如雨頼蔽於崖得不死徐則所束縛䋲索漸斷見井有掬水因取飲之今四十二日矣既出髪盡脱不存時西安謝御史朝宣適按永昌荘以告謝謝謂姦叔母事大不理命荘杖其夫而歸張氏於其父母世謂婦人飲水可七日不死此婦飲水四十二日不死世謂古井中氣多殺人此婦投之莫測之古井而不能殺豈天固祜之與世嘗疑孟子象與瞽叟共下土實井而不及舜之事觀此下石如雨而不能中一婦人况大聖人乎然拱姦叔母而殺無罪之妻天之所以彰於報者昭著如此而謝為廵按顧以事大不理何不畏天之甚荘指揮言之甚悉故志之郡人亦有為傳者著書昔在京師得大學士璚山邱公濬所進大學衍義補觀之適一客至曰觀此見其大病乎否予以未悉對則曰此書於事理治具無所不該獨於宦官通不及一言盖不逮源流至論逺矣豈止落第二義哉後悉觀之信然則客猶未䆒其立意之失也盖真西山所衍者本也本正則凡措諸天下國家之事凡常變逺邇大小精粗皆不待言而其多亦非言之所能盡也乃欲列目開條以盡之其事殆未可畢盡而已拘隘失前賢之本意矣復首論聖神功化之極為補前書自以為備殊不思見道造理之言雖異然見道者未必背於道也觀邱所著鍾情䴡集雖以所私擬元稹而浮猥鄙䙝尤倍於稹所撰五倫記雖法髙明而謔浪􅃧笑尤甚髙明乃以此論聖神功化之極不幾於娼家讀禮乎合而論之不過欲人知其學博而幸其名傳非真以道見於著作者也所以其書必欲進必揣近侍喜斯朝廷刻之故不敢論及宦官也書法史綱如曹操書死之類所以補綱目書法之未盡亦甚有見獨綱目書劉備見諸葛亮於隆中史綱易見為訪殊不知此見字不特尊亮能自重表昭烈下賢亦本於将軍豈願見之此人可就見之義以紀實也可謂盡書法之善矣史綱獨易見為訪欲輕其詞以崇貴勢其意必以為本用王訪於箕子之訪顧不思武王時為天子箕子時為亡國臣書訪足以盡其實孔明髙臥其事豈比箕子昭烈時為漢臣其尊豈比武王而以求異昧其實可乎邱平生博學亷㓗好勝而躁崇勢而隐於此益可見矣功業淳安商文毅公輅自鄉試至廷試皆第一百五十年再無比但人不傳其功業然觀成化中太監錢能怙寵敷虐滇人如在水火而無敢言者公獨奏請推舉剛正有為智識超卓大臣一員廵撫雲南遂得三原王公以南京戸侍改左副都御史以去能甦困此亦後來典機務者所未見也及王公舉劾能罪而眉山萬公安大名王公越乃受能賂沮之皆任事大臣也而賢不肖相逺如此鄉音北方士夫不能唇音如以武為五以尾為韋以望為旺以襪為穵以茂為冐之類難以數舉吾鄉不能齒音如以事為四以之為知以使為死以齒為耻以詩為尸之類亦難以數舉若如江南江西閩廣之有鄉談者則又不勝舉其失何音矣同年儲戸侍巏嘗言不必相訾唯讀書審音而用心於言語者方正此言最是三臣眉州萬公安濟南尹公旻三原王公恕皆舉戊辰進士成化𢎞治間俱官一品其存心律己為國憂民騐之於𢎞治以來萬衰特甚尹次之王益盛天之報施隨人善惡而應未嘗少爽為大臣者於此觀之亦可猛省矣書誤大學衍義補祭五祀條下引周禮大宗伯以血祭祭五祀按古註䟽大宗伯以血祭祭五祀者乃勾芒蓐收𤣥冥祝融后土五方帝之祀非人家井戸竈中霤之五祀故序於五嶽之上其為五方帝明甚今乃引為門井户竈中霤之證誤矣武侯論嘗疑武侯昭烈欲復漢而不知桓􅂕寵任閹宦賊害忠良盡失天人之心非成哀之比及讀吕温武侯廟記則温固有此論矣但温欲武侯諭民曰我欲安時非為漢也此則不可盖昭烈固漢之子孫不當叛漢自便以求成功此武侯所以有先帝毎與臣論此事未嘗不歎息痛恨於桓􅂕之説盖其君臣之義亦庻幾明道不計功之識矣若如温言明言桓􅂕不君我則為民義士先已輕之也此其君臣所以痛恨之意正在於斯之難武侯豈無温之見哉至司馬公論昭烈只以族属踈逺為言而以南唐比之其乖誤已甚朱子固正之矣然論者只辯其非䟽則亦非盡理之論盖人君之命由於得天本於有徳故天佑民歸皆以一徳昭烈雖不能純一於徳然在當時比之操􅁠可謂有徳矣雖非漢之宗室其志在匡時其才堪遏操固君子之所當從而後世之所當與也豈可校其親䟽哉若以䟽而黜之則見存之劉嬰其視光武孰親則當責光武以奉嬰而不當自立矣通鑑既知不責光武奉嬰或立劉氏之親且賢者顧可以昭烈於漢為踈逺而比之南唐哉在當時則漢不當復勢不可復在昭烈孔明則當以復漢為義而不計其勢之難温豈足以知此刻報袁盎晁錯皆天資刻薄私己自矜之人盎如毁絳侯卒致絳大與結交説申屠嘉卒致申引為上客見竇嬰言呉所以反皆由晁錯錯如因淮南王死即􅂆文帝斬丞相御史以謝天下夫淮南王罪當死若之出文帝意於丞相御史何干盖錯必有私怨於丞相御史故因文帝之信已而䧟之史失載矣錯竟斬於盎之譛盎卒刺於梁之賊而竇嬰右盎以殺錯亦以飛語為田蚡所戮據其死皆不以罪而刻深私己争逐勢􅁠傾奪智計而天各類應之無少爽者皆天道孔赫之不可掩者遷史不論及此而以變古亂常不知時變斷之末已善富善富二字班書言任氏折莭為力田役人争取賤賈任氏獨取貴此意最好盖富而不善必為姦利既為姦利必致禍敗矣􅂕哥㓜聞􅂕哥者居濟寕之魯橋能預言禍福本猴也因竊陳希夷所錬丹藥食之遂􅂕通至今今所居必擇人妻少有色者以其夫為香通而居其家問事者踵至香通家為設絳帳居之於絳帳前傳語時來两京京師則多居鮮魚巷問事者瞻拜先自索錢曰不可輕易我香通要交錢足數方告之正徳間家因㑹女客失一銀物遣老婢徃問之既多與香錢只曰其物已為人竊毁用矣問其人姓名只曰我説其名人來怪我香通因不説老婢囬言家人不平遣再問之索多如前始曰物是孫少卿家劍童毁用了再不可得矣老婢恐再問而猶不得則起立於旁伺之至乆問事者盡去帳中問還有人否其香通不知老婢之伺於後也答曰無有即掲帳老婢見帳中一猴據床而坐随聞空中傳呼聲遂不見矣出只見香通之妻艶粧盛餙年可二十餘自看裁青紗袍里婦敬禮夫希夷今尚不存而猴竊其丹藥反􅂕通乆長如此此一不可曉仙家錬神離形謂之脫胎今聚則故形㪚則無見雖仙家莫兼此二不可曉仙之術曰出神之後再無嗜欲今孜孜求錢盛為張設此三不可曉仙家丹成升舉之後再無男女之慾今日依少婦擇色宣滛此四不可曉仙家采錬皆用童女今只用有夫之婦人以長生此五不可曉仙家丹成則不食煙火之食今日食炙鷄燒酒又能變化不測此六不可曉仙家絶世今時與人為猜枚賭酒之􅃧為􅃧謔人世之談此七不可曉既通􅂕變化矣不知老婢之在旁而誤見其故形此八不可曉既能人言矣又不能為人形此九不可曉夫有形體則不能不病有嗜欲則不能超世今於飲食財色之好皆與人同而加甚於形體於嗜好仍與猴同而通􅂕過之此十不可曉也且如張平叔以後謂為天仙者凡幾人矣而音絶神冺再無徴矣而猴之長生住世乃如此今自侯王以上士夫以下罔不尊崇奉之曰上聖曰􅂕仙而不敢正其妖其凟亂男女已甚而不敢禁其事更日崇之信之何也着忙宋叅政應登嘗言康状元海謂東坡范増論後數句忙殺東坡盖以峻快斬截為着忙也此亦有見矣然不免溺於一偏縁康之文全學史記之紆徐委曲重複典厚而不知峻快斬截亦史記所不廢如韓信傳中任天下武勇以下載我以其車一莭可見東坡於此等得之而今日舉業宗之康見之熟而遂以為忙不知史記為文如王右軍作字歐師其勁顔師其肥虞師其匀圓各成一體皆可取法不可以已好典重紆徐而遂輕彼峻快斬截也必欲備之斯可矣然康此言却是自己有見識不隨衆歓喜所以能自立於古文也女色女色敗國固不俟論然觀自古以色著名者多不善終如妹喜妲己褒姒戚夫人趙飛燕趙合徳潘淑妃張䴡華楊太真宋劉貴妃之類不可枚舉唯武瞾始以媚名卒僣天子位以夀終盖古今天地之大變難以常理論也然其色亦不聞如前之羙貝原雲南用􅚔不用錢􅚔即古之貝也今士夫以為夷俗殊不知自是前古之制至周始用錢故貨貝毎見於古書榖梁傳貝玉曰貪貨殖傳載之不一東方朔曰齒如編貝文中子曰蘇威好鍾鼎珪璽錢貝皆謂此也又制字者如財貨寳賂賄賈貢貴賢貲貺賚賔賦質賫賞贈貽賛貸贍贐贄賻買賣之類不可盡舉無不用此則貝為寳貨固始上古禮含用貝玉其重尤可見而顧以用􅚔不用錢為譏誚不亦異乎南園漫録卷三
