body:
  text: 南園漫録卷二明張志淳撰拐子馬金烏珠用拐子馬馬相連以革軍亦貫以韋索號長勝軍自言從海上起兵用以取勝然燕慕容恪以鐡鎻連馬簡善射鮮卑五千為方陣而敗冉閔則用兵之法前固有之稱謂𢎞治初三原王公恕為吏書鈞州馬公文升為兵書同朝王公長馬公十嵗及王公以太子太保致仕馬公於𢎞治中以少師兼太子太師為吏書毎對予言及王公不姓不號但曰老天官前軰之謙己敬徳如此風裁錢塘􅌼公岳𢎞治中以太子少保為吏書一時極有風裁人畏奉之恐後惟為都御史張公敷華一沮盖公後南來假錦衣官之宅以居後欲償以值堅不受云有鹽在淮乞一書與張獲支則已矣公從之張得書云我知􅌼冢宰風裁直吏部外官所當奉第某老矣行且謀歸不能屈法以奉也公大悔沮人傑東坡論范増為人傑盖本漢髙以蕭何張良韓信為人傑即繼以項羽有一范増不能用則漢髙固以人傑許増矣此東坡所本也容齋只據楊氏之論謂増非人傑謂坡論未盡夫増之為人尊以亞父則留言計不用則去且又能逆知漢髙之志不在小終能覆楚非人傑其誰能之予少嘗作増論惜其不能佐梁聲秦之罪以伐之而假立楚後以為漢資今思之亦不止此盖羽有盖世之勇増負間世之智羽既尊已謂以智佐勇而天下無餘事矣殊不知羽雖勇一人之勇也已雖智一人之智也顧再不思求天下之勇智以為勇智此其所以失之信平軰而更不聞薦一士也其志業無成所蔽在此耳使増非傑漢髙肯溢羙之於身後耶觀朱子以豪傑許王猛則増以人傑稱不為過而容齋踵楊氏之説為過矣工魚大理出魚細鱗而纎長長不盈尺多腹腴而味羙名曰工魚雲南誌載之謂土人不識江字因誤為工其説非矣盖古韻江有工音如陶淵明停雲詩時雨濛濛平陸成江李翺别􅏦山神文我亦何功路沿大江大理自昔曉文義故用古韻豈昧一江字乎兹非土人不識字乃脩誌者不識字耳當時閤老陳公文為雲南布政使實搃裁之顧亦不察對句翰林院學士一人多或三五人閤老洛陽劉公健脩㑹典成欲徳翰林一時陞學士者十人時餘姚謝公遷以禮書為大學士在内閣南昌張公昇為禮書湯隂袁公守直以禮書掌通政事賈公斌以禮書掌鴻臚事南都禮書忘其名而掌太常事崔禮侍志端復進禮書崔無室家由神樂觀道士京師為之語曰禮部六尚書一員黄老翰林十學士五个白丁朝紳一時盛傳以為的對而有譏警盖十學士内五人皆成化戊戌閤老萬公安所選為庻吉士者至是三十年而公論終莫掩予於五人嘗見二三人之作固非誣也第一對句而於時事及萬劉二公之隐皆可考見人言可畏乃如此然吏書亦號文部如許公進劉公宇視予所見三人復有間而人卒不以此置喙豈非終不以文學為職業與北岳馬公文升為兵書時建言北岳當祀於山西渾源州之恒山今南祭於曲陽縣者始於李唐飛石之祠而宋地不及北岳所在故誌有恒山飛来之説今京師在北恒山在境内而顧南行以祀北岳非禮也請改祀於恒山為允事下禮部時􅌼公岳為禮書固執誌言不可事遂寢馬公嘗語予􅌼非以誌必可信也其父謙無子嘗遣祀曲陽之北岳因私禱神求子夜夣岳神捐旁侍一人與之後遂生􅌼公因名曰岳以是渠固執不改祀然舜廵狩所祀北岳見在渾源州南二十里彼人猶知奉祀而顧可徃曲陽縣西一百四十里祭乎殊非禮矣予因思之信如誌所言則亦唐失河朔神不饗而飛至曲陽也宋繼唐而王通無河朔則踵唐而祀於曲陽亦理勢使然也今舜祭之地既在山西而信誌言誤矣借曰神在唐宋已飛来則在今日亦必欲飛歸矣抑􅌼無嗣以姪後官止太子少保為吏書一年遂卒夀止五十有七其禄位名夀視鹽山王公翺三原王公恕有間矣而二公何不聞為神降與或曰􅌼為吏書有名然二公之名逺出􅌼上或曰􅌼以驕侈失之然則為神所降顧為驕侈以累徳而非神所降乃復優焉此殆有不可曉者予友張御史西銘臨安人也母夣黄鶴入帳生仕終御史舉人劉斗母夣斗降於室中生故名仕終廣西都司幕職此尤有不可曉者郡城永昌城之山曰大保俗呼為寨子山舊城於山下洪武十四年為麓川思倫所屠十六年指揮夀州李觀築今城於山下又築子城於山上日輪兵守之二十三年觀卒指揮胡淵代之始去子城而以觀所築之西面移包於山上盖淵見京師城包鍾山故也遂盡㓕觀之績以為皆已所築故至今亦無碑記率相傳以為淵之績業淵子孫又世官於此故再無知者淵既徙城得寵遂革府為金齒司學亦廢為倉至今招鎮守之禍皆淵作俑也據淵更觀之舊而免輪守之兵既可禦㓂防險又使山居城内林木蒼然其績亦不可冺但攘觀之功而無文記又革府為司廢學為倉以貽鎮守之禍其惡亦不可掩而憲副林公俊創立名宦祠於學宫而淵首與焉其亦誤已廢學之人而祀於學何居謂宜别祀於所移之城上斯得已麓夷正統初麓川思任叛屠騰衝據潞江時遣雲南鎮守太傅黔國沭公晟為搃兵官左都督方政為左副右都督沭公昂為右副率師討之師至潞江晟以思任㓜嘗育於其家决意招之時柵守江者思任黠酋􅃡檢法也已許思任决不容渡矣彼見駐師日乆益罵詈無狀政故武將也不勝憤屢請攻之晟不許兵駐乆運餉石費三两師多是政政遂夜率所領兵渡江撃之大敗其衆走緬檢當時謂之飛渡潞江政遂乘勝逐北至上江上江思任所居也政率所領圍其寨不能半而兵晝夜追逐已疲又夷兵救援益衆乃以旗牌取救於晟日數至晟不遣曰我不曽教他去麾下苦言之乃遣一指揮率少兵徃指揮隂探晟意紿言至夾象石遇夷兵不可進遂已政知晟决無援意遂復送其子瑛過江瑛與從者攀哭不已政㧞劍叱之曰汝急去做將官不死不了遂復過江赴敵夷皆披靡馬躓夷攅刺之為泥時正統四年己未正月四日也麾下盡死有潜江流而逹雲龍州者州夷皆醉之而後以竹索穿其掌送思仁斬之晟聞政死遂焚江上運餉披黒氊雜敗兵歸永昌雲南布政使應履平按察使頼巽以其状聞於朝朝遣都御史丁某問罪遣行人曹某祭政贈政威逺伯謚忠毅立祠永昌子瑛招魂歸𦵏郡人哭皆失聲晟駐永昌乆聞遣官問罪遂隂遣人告之曰吾為主将凡䘮師失律吾皆任之遂發永昌日唯以冷水啖市所賣酥油燒餅行至楚雄遂卒時三月十六日也年七十二事聞朝廷以晟位望素隆嘗闢土安南今又以敬畏國法自殞遂贈晟定逺王謚忠敬尋以子斌請立祠雲南斌卒子琮嗣琮無子嗣遂絶正統九年甲子兵書束鹿王公驥始大征以政故歴陞瑛至南河侯瑛無他才技時號方三軟謂頭軟口軟膝軟也當驥為摠督偕搃兵蒋貴來時政與晟卒已乆而文逹李公賢撰古穣雜録謂麓川初叛沭晟尚在彼時只遣人宣布朝廷恩威赦其罪撫安之未必不從遂輕動舉兵又不委晟而另遣将以致王師失利適王振操柄逞忿驥阿其意云云夫麓川初叛晟固在鎮晟為搃兵政為左副昂為右副統兵數萬討之在正統三年戊午政死莭上江在己未正月四日晟敗囬永昌在正月五六日自永昌囬在二月盡卒於楚雄在三月十六日驥摠督與貴大征在九年甲子事平在十三年戊辰李為閣老最名有相業極遭際一時國史皆其搃裁庻事皆其綜理顧失實至於如此然則後世将安所憑哉良可歎也至論事理大意只以為得地與人無益而勞費萬萬殊不思政以左都督死於夷極惨烈矣欲不興師得乎前以數萬敗於夷矣欲不大興師得乎嘗見楊文貞公士竒作詩送楊即中寕從征大意與李之見同而不敢露又見王吏書作沭忠敬廟碑與李所言同盖李素敬王而王與楊同朝之見又同一得沐氏子孫隐蔽溢羙之状中其素見遂不復疑李遂據以為真而以其事遷就之而筆於書而不復考也夫振之惡雖不可殫述然其主麓川一事於國體於利害於忠臣義士之寃於乆逺之計自今觀之殊為有得不然則歴今七十餘年為中外所壞不知群夷變亂㡬畨矣何以能帖然如此嗟乎如楊王李三臣在我朝可指數而於史於事於是非皆顛倒謬誤至終身莫之省改此朱子於撰張魏公碑而深悔只慿渠家草來所以為大賢不可及與廵撫成化丁酉王端毅公恕來廵撫雲南不挈僮僕唯行竈一竹食羅一服無紗羅日給唯猪肉一觔豆腐二塊菜一把醤醋水皆取主家結状再無所供其告示一欲携家僮随行恐致子民嗟怨是以不恤衰老單身自來意在潔已奉公豈肯縱人壞事云云人皆録其辭而焚香禮之後公為吏書予見公衣服飲食雖不侈而亦如常後見公祭兄文有曰昔徃撫滇人皆言錢能勢不可犯犯即有大禍惟兄􅂆從正果遇禍兄以死理雪從是觀之公畏天憫人固非利害所能怵而公兄之賢亦有以助公之氣與志也减字唐劉闢新書傳曰始闢嘗病見問疾者必以手行入其口即裂食之唯盧文若至如平常故益與之厚舊書傳曰初闢嘗病見諸問疾者來皆䨇手據地倒行入闢口闢因磔食之唯盧文若至則如平常故尤與文若厚今按䨇手據地倒行入闢口共九字手行入其口减去䨇據地倒四字乍觀之不知為何説也曷如舊書之明暢乎前軰非之信矣識見司馬公光宋之大儒其所修通鑑如紀武曌黜中宗帝曹氏㓂昭烈朱子作綱目已正之矣至於削去留侯迎四皓事以為子挾父夫以為挾父則當載之而論以為戒不為挾則當書以為􅂆顧從而削去則太子曷從而不廢乎如有疑似削之可也留侯定太子之事漢書屢見如周昌傳亦明言以留侯䇿止顧削以㓕其迹可乎又如取李舟言謂天堂無則已有則君子登地獄無則已有則小人入夫天堂地獄之無豈待疑似而述舟見道不真之論以教人是啓之矣朱子謂其氣與理不曽㑹得恰好處二程毎引之終不能上所以識見不真而偏執如此損卯今木工構屋交㑹之處鑿為損卯殊不曉其義意偶見金史張中孚製小舟數寸不假膠漆而首尾相鈎帯謂之鼔子卯則卯字固載於史矣但二字之名義終不可解藥名􅅫蘽覆盆子本草各出二條是矣下又引唐本注曰覆盆􅅫蘽一物異名今注曰􅅫蘽覆盆之苖覆盆􅅫蘽之子則全誤矣縁此紛紛議論通不能辨二物惟衍義謂􅅫蘽非覆盆也自别是一種雖枯敗而枝梗不散又謂覆盆子四五月熟味酸甘外如櫻桃許大軟紅可愛失採則就枝生蛆圖經謂莖葉皆有刺花白子赤黄如弹丸下有莖承之如柿蒂状三條為是然衍義又謂軟紅可愛則又以􅅫蘽為覆盆矣􅅫蘽初熟軟紅覆盆則不紅也殆不如圖經赤黄之得真矣然圖經又謂苖短不盈尺則又非也覆盆樹與苖但不甚髙也衍義又謂長條則又以􅅫蘽雜之矣覆盆不生條也本經既分為二物是矣下又云一名覆盆子則本經已誤於先矣􅅫蘽子初則淺紅熟則深紫有芒頗長覆盆子初則黄熟則赤黄芒㣲􅅫蘽蔓生條而甚長覆盆樹生枝而不甚髙􅅫蘽子味甘酸而淡覆盆味甘酸而深􅅫蘽刺大而稀覆盆刺細而宻􅅫蘽枝梗枯敗而不㪚覆盆枝葉四時如一只是其子形状其以津液為味其熟之時皆同本經遂誤陳上良識􅅫蘽為苺言其形皆是而不能定為􅅫蘽㓂宗奭知覆盆異於􅅫蘽而又誤以為紅餘注則通無所見矣因據所見辨之使愽物者不眩也南園漫録卷二
