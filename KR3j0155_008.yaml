body:
  text: 南園漫録卷八明張志淳撰髙起居髙起居者名莘山東人也洪武中以起居注充軍於永昌始至掌印指揮欲延之為西賔髙固辭由是發左千戸所俾守昇陽門以苦之乆而千戸意其倦也乃使人代其役而教其子髙又固辭乃復遣人誘之髙曰吾既不為指揮教子顧為千戸教子乎執役守門分也千戸怒俾日持鎗不使代髙安之千戸益怒適大雨彌旬髙妻孥皆居城旁之官舍千戸遣人雨中逐出不使居衣衾皆狼藉於雨中妻孥對泣予先伯禾齋從髙學因率同學徃請曰某等俱有屋請移去何至自苦於雨中如此請益勤因語先伯曰彼怒至此而吾即有所歸是甚之也遂處雨中至昬乃徙嘗告先伯曰吾為起居同罹法者三十餘人刑部尚書開濟引奏上閉目不答乆之開目濟又敷奏如前上復閉目不答如是者三始曰某人并山東大鼻子生員做的着去充軍其餘的都殺了當初引奏時自分必死只跪於後俟得㫖即撞死陛下以免此一刀不意獨䝉免死之命因自思之同罹法者毎見上意喜皆争先進言一值上怒皆縮恧失措唯某與吾喜亦不敢肆言怒亦不敢惴黙所以遂䝉天監而獨貸此命也志淳聞此而恨生晚不及見之嘗以聞先君云髙唯一子生一孫今皆湮㓕矣不識天道竟何如也志淳竊謂此足見髙廟慎罰之一端而不止起居之一節恐乆復無所考見也因備述之内奢吴歩隲手不釋書被服如儒生然門内妻妾極奢綺頗以此見譏今京師士大夫之有名者最多有此而人更慕之以為善處官此亦時好使然歟使大理南詔即今大理府也事著於唐頗備逮宋史雖有大理傳亦甚略如容齋隨筆載淳化中遣蜀人辛怡顯使南詔謂南詔夷甚服諸葛大理傳中亦不載仙之詩朱子感興詩深信仙歐公感事詩深非仙朱詩曰飄飄學仙侣遺世在雲山盗啓元命秘竊當生死關金鼎蟠龍虎三年養神丹刀圭一入口白日生羽翰我欲徃從之脱屣諒非難但恐逆天理偷生詎能安歐詩曰空山一道士辛苦學延齡一旦隨物化反言仙已成開墳見空棺謂已超青冥尸解如虵蟬換骨脫其形既云須變化何不任死生仙境不可到誰知仙有無或乗九班虬或駕五雲車朝倚扶桑枝暮逰崑崙墟徃來幾萬里誰復遇諸塗富貴不還鄉安用富貴歟神仙人不見魑魅與為徒人生不免死魂魄入幽都仙者得長生又云超太虗等為不在世與鬼亦何殊得仙猶若此何况不得乎寄謝山中人辛勤一何愚歐公生朱子前百有餘年二詩想亦朱子之所見而好尚不同如此竊意朱子因一時見其事而發又志在不從其術故不覺稱之而不暇究極其終無也歐公因平生考其實而發又歴見其不能長生故不覺斥之而不復推求其暫有也不然吾誰適從哉蒟醬蒟醬之名見於史記注釋亦明矣因宋周益公偶失記而妄對蒟醬之名顧益顯此物余地所産蜀都賦所謂縁木而生其子如桑椹長二三寸是已生時深緑色日乾即黒雲南梹榔以此及濾净石灰合而嚼之呼為蘆子郡人販於雲南動數十䭾也梹榔廣西所食即其心乃藥中所用也以三頼及蔞葉共之乾硬無餘味雲南所食採其嫩者分為四連皮與心合以蒟醬净灰食之軟而有香味然此物只下氣破氣飽後頗宜今日食不置唇齒皆紅而士夫反從之為宜殊不雅也唯三原公至滇不食焉慕容垂晉書慕容垂以晉太元十一年僣即帝位以太元二十一年死死時年七十一則初為燕王叛符堅時時方五十八九嵗何符丕遣姜譲責之乃曰但念將軍以七十之年懸首白旗堅亦曰念卿垂老而為賊恐必有一誤嬖幸漢哀帝嬖董賢遂病痿痺而早夭符堅嬖慕容冲遂至䘮亂而身死近見名臣有功業問望而或死亡或身後不競毎求其短皆坐此也可忽之而不戒哉减年昔居京師見進士减年嵗益甚毎思宋㓂萊公凖不肯减年以應舉者矯之而無對者後讀司馬朗傳乃知伯逹志不損年以求成正可為對只當時見書不多耳嫡庻庻不止為妾生亦有以嫡庻言長少者如鄭莊公與公叔段俱武姜生莊公封叔叚於京祭仲曰京大於國非所以封庻也則同母弟亦可以稱庻矣骰子今擲骰子而博者曰神擲亦有本慕容寳與韓黄李根等因讌樗蒲寳危坐整容誓之曰世云樗蒲有神豈虗也哉若富貴可期頻得三盧於是三擲盡盧寳拜而受賜故後寳勸垂殺符堅曰五木之祥今其至矣又劉毅於東府聚摴蒲大擲一判應至數百萬餘人並黒犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣繞床呌謂同坐曰非不能盧不事此耳裕惡之因挼五木乆之曰老兄試為卿答既而四子俱黒其一子轉躍未定裕厲聲喝之即成盧毅意殊不快也又招魂箆􅞴象棊有六簙朱子註云箆竹名􅞴簙箸也投六箸行六棊故為六簙也言設六簙以箆簬作箸象牙為棊也曹偶也遒廹也投箸行棊轉遒廹使不得擇行也倍勝為牟五白簙齒也言已棊已梟當成牟勝故呼王白以助投也按曹植制䨇陸用投子二至唐以重四為堂印則投子猶用二然前已有雉梟盧之采則投子不止用二矣五白五木五木為投子五五白豈投而無雉盧梟者之名故呼以屬敵為助乎然今慱唯䨇陸用二而大投或用六用十其取采定勝負又不同矣疑古摴蒲彈碁之用投子别有制也觀裕挼五木則時用五投子寳三擲盡盧以為五木之祥則其時唯以木為投子而數止用五又不知用六用象用骨用玉始於何時觀朱子以用象牙為碁釋楚詞則用象牙始戰國矣但以五白為簙齒又與裕寳之用異焉著述著書古人道有諸已不得見諸用故不得已而為此若幸遇明時道有可行又何著書然亦有感事與時而著若朱子為趙汝愚見害於韓侂胄而註楚辭是矣然序楚辭者通不及此正統歐陽永叔因五代史帝梁而不黜以為欲著其罪在不沒其實意亦可矣至論正統謂秦親得周而一天下其迹無異禹湯此何言耶楊廉夫因元修宋遼金史上言以論正統意尤善矣至論宋之君中國非欺孤弱寡之所致此何益耶盖秦雖能一天下其行事之迹可考也宋雖可為正統其得國之由可徴也歐楊二公顧於其實昧之者無他知黜五徳之運之説矣而未究事理之紛雜以求合乎正統之名義所以厭衆人之私而不覺已之蔽也愚嘗思之能合天下於一謂之大統合而有道謂之正統雖能合天下而不以道若秦晉隋只謂之大統一統可也若其前世合而有道已為正統後為姦臣簒奪他族并吞而其後尚賢或不至無道若漢昭烈晉元帝宋髙宗則仍以正統歸之此以理言若隋晉秦元則但可謂之一統斯無議矣所以然者彼於道甚逆而以勢一之故也若曰宋之取國亦不義則請比之秦晉隋元自還優也歐陽公於梁則云不失其實而其罪自著却又强求秦世比之啇周舛已要之有一統天下者據實待以一統其先有一統而正其子孫猶可稱而干其統者又惡而未能混一若魏之承漢梁之承唐之類自不足論只於一統酌其賢愚善惡正不正而别之斯於義例無偏而可據矣地理宋論言朱子建言欲為夀皇體魄安寕之慮宗社乆逺之圖而引𦵏術精於郭璞而不免王敦之毒手子思𦵏孔子不聞有此異術而舄奕萬世愚毎騐之𦵏得吉地子孫多昌𦵏得凶地子孫多敗有灼然不可誣者如孔子功徳冠萬世當時雖無𦵏術而地必自吉矣如郭璞死於王敦盖彼生有定命初未嘗為已擇葬而遽死矣此難决其術為泥也大抵天括乎地人果善為天所佑子孫當昌雖不擇地或擇地罔不逄吉而後必昌矣人果不善為天所殛任擇地求術罔不逄凶而後必替矣盖天之理能包乎地外也先君深於地理術而恒言其理如此今觀之朱子與蔡元定擇𦵏而欲綿長其後世至今蕃衍於福雖云功徳所致然擇地亦昭然不可掩者看來為善以為本擇𦵏以為用為善存諸心擇𦵏求諸地得其本者用或可忽失其本者雖日孜孜尋地精術亦無益矣近見名卿士家專精地理者而後嗣多衰替故益信天理包括乎地理之説為正宋論㓜時讀永新劉公宋論引漢髙周平王以見髙宗之可矜而不可全斥其非已覺不强人意縁此遂云當時雖有澤綱鼎浚為相張韓劉岳為將恃以支吾則可矣欲望其制烏竒邁尼瑪哈君臣之死命豈昜能哉夫鼎浚張劉則誠不能矣使以澤綱為相韓岳為將則豈有不能制金而復中原者哉觀岳之郾城駐兵烏珠將棄洛遁遁則人各乗勝有不能制烏竒邁尼瑪哈之死命哉以岳一將其效且然使以綱主之於中而又助以韓劉於外烏竒邁君臣其能當之此事理之明白易見者而永新乃如是立論使在宋世幾及趙鼎亦難矣哉辱末今世俗多以辱末祖宗辱末世界詈罵人家不肖子孫及惡人之貧不知耻者若士夫則曰玷辱汙辱而已用是俗言辱末字無考亦莫能觧偶見漢書有汙衊宗室顔師古註云衊音秣謂塗染也然後知俗言亦有本也後漢書范曄後漢書盖出為宣城太守不得志乃删衆家後漢書為之論者譏其賛辭佻巧又創為皇后紀復采王喬等詭事入列傳朱子又非其不録胡笳十八拍而載悲憤二詩盖曄極無行義之人也其傳琰之初意已自有在而何能深探哀怨發中之㫖哉只如邉韶之傳竟何所關繫試使七家舊列於漢書曄亦當刪去之而載之至今人皆喜談以為故事殊不可曉好佛佛教彼地之夷皆酷嗜女色金寳争戰故佛氏出而通絶之既絶諸好因静而明所謂善知識者是已夫以其類之溺而創見佛之㧞出如此固已傾企而又見其知識逈異如此是故奉其説而行也然佛亦自病死矣則類之黠者乃廣之為再生三生輪廻報應之説以保其常存而因以自利此盖夷之智者以眩其類之愚也自東漢引而入之遂不可救正縁帝王皆利而惑之如唐太宗之英明猶然則他可知矣獨豪傑如蘇子瞻軰好之尤甚嘗疑其喜恠誕瓌異之談以自放非真不知其妄而事之者偶見其寫金剛經施僧題曰為亡考資𠖇福以祖母綉旛捨之金山又曰以資𠖇福看來其好原在利佛之福而不識其誕也以蘇之聪明盖世而一為佛之福利所惑遂昬昧至此才可恃乎所以然者盖自老泉以上皆事之如綉旛之類漸習已乆而不自覺也以蘇之才使早得三遷之教其昬於利豈至此乎人家任婦女事佛以為可以化愚亦大誤已金多王鎔為莭度使以金二十萬謝李匡威納李克用縑二十萬又進幣五十萬糧二十萬又以幣二十萬賂朱温按五代史鎔所有地自其父景崇以上曰世為成徳軍莭度使皆今真定府一府之地也而財貨之多如此則唐季節鎮之取於民者多矣欲不亂不亡得乎中書校事魏蔣濟所言中書事極似今之司禮監程昱所言制校事極似今之東厰錦衣衛行事校尉盖縁士之仕者通不識義理而致此也豈非勢使然乎豈非吾人不飭以召之乎節義予郡北有北津橋俗名板橋有李姓婦季氏家在城中有色而寡居景㤗末都督毛勝來鎮守以逹旦降中國又首謀鎮守其勢燠炎聞者震讋聞季色即遣人取之其姑與父母聞之皆裭魄争勸從之婦不應只以刀隨坐臥不置曰再來即自剄勝乃别遣官以勢動之守死不二遂獲免先君毎聞旌表莭婦輙語予曰逹旦來鎮守而季氏能以死拒之不辱則後之旌表者風斯下矣及予歸訪之湮沒不可究矣因為識之考官左都御史浮梁戴公珊當考察時吏部只欲憑廵按御史考語黜退公不從吏部曰如是我不擔怨公不然私謂志淳曰果欲如此吾與子先将御史考覈從其賢者斯可不可如貴堂上一概從之由是果有所得公可謂公無私矣宜孝廟之重之也早朝詩唐賈至早朝詩王維杜甫岑參皆和之今天下善書者皆書之胡仔評四詩佳絶恐未深究四詩至雖首倡視三詩少劣岑不及王杜前四句渾雄竒特三家皆當遜後四句似乎力竭視王若少貶焉胡皆以佳絶似欠别白矣不識知詩者以為然否所見黄叅議金鳯陽定逺人也為予言成化中曽見二建庻人内官呼為大哥見生員通不識内官為言之皆唯唯其時亦老矣而身材甚矮南園漫録卷八
