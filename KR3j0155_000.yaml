  - {type: page-break, offset: 0, content: '', id: KR3j0155_WYG_000-1a, image: WYG0867/WYG0867-0255a.png}
body:
  text: 南園漫録雜家類三雜說之屬提要臣等謹按南園漫録十卷明張志淳撰志淳字進之本江寧人𨽻雲南金齒軍籍因為永昌人成化甲辰進士官至户部侍郎是書前有正徳十年自序稱因讀洪邁容齋随筆羅大經鶴林玉露二書仿而為之卷首數條皆舉容齋随筆之語而辨其是非盖其書之所縁起也其餘則述所見聞各為考證大抵似洪書者十之一似羅書者十之九所論如江神一條譏洪邁舍人事而謟鬼神邱濬著書一條譏其大學衍義補不敢論及宦官立意皆極正大其避諱一條謂蜀本書多缺唐諱乃相沿舊刻桂辨一條謂桂花桂樹為兩種張籍詩意一條謂瞿宗吉歸田詩話不知其作還珠吟時已先居人幕下駁正皆頗明晳其辨永昌非金齒地諸條考證致誤之由亦極詳核他如春草王孫一條王維詩語實本楚詞而昧其所出横生訓詁之類或失之陋元順帝一條誤據庚申外史符䑓外集之説以順帝為瀛國公子之類或失之無稽盖瑕瑜不掩之書也中頗紀載時事臧否人物故卷末又有嘉靖五年題後一篇辨何喬新撫夷録之失實而以書中所載自比于孫盛書枋頭事其所紀録亦可與明史相叅考云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀南園漫録序予閒居四年惟鉛槧是事去年冬病乆凢書之宏深旁魄者皆不能事事則取雜説如容齋隨筆者數十家以消日㓜子合侍而問曰此何書曰此宋人洪景盧氏紀事之書也曰大人日觀之有可言者乎曰容有之曰可學乎曰此皆紀事之作事隨代有而義理無窮奚不可學也曰然則何不效為一書乎曰洪在宋為法從家居食禄終身當時人君所以禮之者甚至予何敢方之越翌日取鶴林玉露觀之合復問曰此何書曰此宋人羅大綸氏紀事之書也曰於洪書何如曰將無同曰羅何人曰羅吾不暇考然觀其自序曰為臨川從事被劾而歸是書適成則止於從事也已曰然則大人亦何以埒洪書觀之而此書抑何以傳至今不廢乎將書惟其言而不繫於遭際與否也予不覺逌然遂為書容齋所未安者數十事而并予所聞知有似二書者廣之題之曰南園漫録要之文雖不工而揆事昭理亦或有可觀者正徳十年春正月永昌張志淳序
