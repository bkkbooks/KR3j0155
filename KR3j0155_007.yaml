body:
  text: 南園漫録卷七明張志淳撰緬種貴百蠻種唯思倫氏最貴洪武中嘗屠永昌擒守城指揮王真後遣使往諭方放還王真至正統初思仁遂叛盡取孟養宣慰之地孟飬宣慰刀玉賔挈家來訴養子永昌暨沭忠敬征之而敗王靖逺始大征而破之思仁走緬甸死時刀玉賔已死絶靖逺以緬匿思仁與子思機不獲遂以思仁所取孟養之地畀𬗟人𬗟以其長子銀起莾居守方以思仁尸與思機解京師無何思仁幼子復為衆所立而攻孟養𬗟不能御而畏殺其子遂盡以孟養地還思氏而保銀起莾歸緬却以狀上求得孟養並聼盞沿江之地思氏亦狀上言𬗟不能撫其人民願立思氏永當朝廷差發時大征之後兵力已疲王因允其請使居孟養嵗當差發立誓金沙江乾方許過江蓋知緬種獨貴而深防之也然彼雖無官其地自尊之如王者既幸王允其請凡中國使至皆不遣坐多餽始得侍坐雖千百戶皆然毋敢怠成化中太監錢能勢熾時遣京官求緑玉琥珀諸寶京官皆小輩貪其重利始與上下坐復與並坐矣至𢎞治初給外夷金牌信符兵部只據官制有孟養宣慰使司遂頒給以金牌信符至滇雲南鎮守及布政司亦莫辨時土酋思祿最能事遂以此遍諭其所統勢益張乃取遮些外國拓地益廣值猛密叛木邦事久不平巡撫官以兵部督逼適值毛參政急於求進因以平猛密自任張大喜許毛功成保之代已遂㑹鎮守俾用兵挾撫相機乘之毛往訪計於騰有千戶尹銘言唯調孟養兵猛密即可破毛信之遂以銀牌調兵孟養孟養見毛勢輕不與則憤猛密叛木邦而得官與之則弱乃以羸兵來隨毛攻猛密猛密既輕毛勢又欺兵少則宣言曰天兵且退後毛官人要孟養殺我與他殺了看孟養兵原無鬪志又無甲胄遂大敗毛燒營逃出猛密設伏要之殱十七孟養怒因復起兵過江敗孟密遂占蠻莫十七處不回而舊畫江不過之誓始不守矣時綿州金御史獻民巡按漢兵餓死於道傷於兵者甚衆欲奏以閣老謝公遷庇毛不敢欲不言事迹甚露乃具略莭呈都察院後毛降貴州按察副使兵備趙炯降漢中府同知孟養遂過江不可制矣毛乃以䇿干京師雲南巡撫承前意乃以使功不如使過保毛復往撫孟養益無所畏毛遂嗾巡撫請兵征孟飬事下兵部兵部只請遣官再勘孟飬乃入貢訴無叛情誤致大罪願以蠻莫等地歸之朝廷且請比普安州米魯叛逆伏誅尋以其族為土官例欲復宣慰司如舊內閣洛陽劉公健以為無官彼亦自王其地有官則可制與吏書馬公欲議許之而內閣謝公遷以毛故議不許值刑書閔公圭浙人也亦右毛而與兵書劉公善竟不許而遣歸孟養思祿死子立復弱地復歸於猛密矣然靖逺畫江不過之防終不可守基禍將來此其端與烈女郡中一指揮有四女而死其妻大肆淫蕩女皆淫奔非類中一女已納聘久夫家知其母與姊妹宣淫欲退親取原聘禮其母固與爭訟不與女善解之使還其聘聘還女遂自縊死夫家聞而路祭之徐訪之方悉其貞可謂難矣分羔漢髙分羔之語先儒以大義非之至永新劉公定之作宋論亦引此以恕髙宗和金為母為可哀而不可非皆不足以究漢髙為智之大用椎之精也蓋其所以敢為是言以欺羽者必其內能隂結項伯以有恃而史失載也觀伯自受珠夜去之後而范增劍舞之計俱沮破於伯而終易姓受封則自太公吕后被執之後漢髙有不隂通伯而求其保護者乎伯既可恃則為此分羔之說以老羽乃所以全太公吕后也合羽欲烹太公而伯止之之言並觀之則分羔之言亦與伯預通之矣卒之太公吕后自歸非漢髙用智行權之善能及兹乎而後世竟不識也親猶身也身有痼疾久則致死其人只知愛身而不敢針砭毒藥恐不能愈而速致死其子知用毒而可得生則仁人君子是其父乎是其子乎即此可見漢髙之善於救親矣而顧非之豈不迂哉茍以於親不忍為此言此正迂儒之常談而宋髙宗之見也曷足以救其父哉如我朝己已之變所以不與也先求和而一意戰守乘輿自反其有得於用智精而處權當矣使漢髙日為哀求祈請而無項伯之用則太公死於羽矣安望五日一朝之慶哉紀傳史記於項羽為本紀最見其據實立名觀鴻門之宴羽東向范增南向漢髙北向坐張良西向立一時分封王侯其以人君自處而衆亦尊以為君也可見故史記據實而為紀而漢前亦無議之者又可見漢世人才風俗之正猶近古也至班固始改為列傳然則羽當時行事果與張耳彭越輩埒乎否也况羽有誅秦之功其視朱溫篡唐不啻鵬鷃之不侔歐陽五代史猶以溫為本紀謂紀實善惡自見曽不以羽紀為是何哉班固好諛遂啓後世之曲筆殊不足取也若謂推尊本朝則如司馬禎氏列為世家亦可已然遷史紀之矣而不曰楚不曰霸王而曰項籍至漢則曰髙祖是其輕重之間亦精矣世知尚遷史而不知其識正見精逺出好諛之班固動稱曰史漢班馬故少别於此俾有真識定見者裁之曹操姓曹操父嵩本夏侯氏為中常侍曹騰養子故冒曹姓嘗疑操當為王時必能知其本姓矣而終子孫不改所冒以復本姓之故不可得偶見杜瓊傳言當塗髙為魏因言古者名官職不言曹始自漢以來名官盡言曹吏言屬曹卒言侍曹此天意也因知此等䜟緯操豈不飽聞而飫聼之所以封魏公進魏王終冒曹姓而不復夏侯者其欲篡漢而代之無往而不極其姦謀耳禪授王莾篡漢則假之周公之居攝其攻翟義則全擬大誥然當時皆能識之後之者亦不復可見矣曹操之篡漢則假之堯舜之禪授且貽謀於丕專擬唐虞當時唯豪傑斯能識之後之者自晉宋齊梁陳東西魏北齊後周隋唐五代宋罔不遵其制然則操之姦雄才略優於莽者此亦可見使操不值昭烈武侯與吳之君臣其一天下也無難事矣豫嘗為之論曰昭烈武侯不幸而值操操不幸而值昭烈武侯不然邪正雖殊德力雖異均可以一天下矣詩意歸田詩話載所作還珠吟以短張籍還君明珠雙淚垂何不相逄未嫁時之句殊不知張因當時已居莭度使幕下而知張者又辟之故張作此吟以答之而道其實非立意以為教也瞿宗吉不原張意而擬以正之已昧張意㫖又云楊復初題其後云義正詞工使張見之亦當心服夫義雖正矣初不知原張之心與事張何由服乎祗益張不慱考之歎耳文繁簡國語載晉侯使隨㑹聘於周一事左傳襄公十六年亦載之共七十餘字其視國語共四百三十八字者繁簡何如也然以文章觀之則左傳之文劣矣夫二書均左氏筆也而繁簡之間優劣頓異知文章者固不可徒以簡為上也意左氏必以著於傳者為不足顧又於國語發之與盜娼仁義郡有偷兒知一家夫不在而其母與妻織布且畢夜伺之寢將穿窬取之至久姑詈其婦怒而先寢俄而婦自經於機旁偷兒大呼其鄰與姑起而救之婦得不死又一賤娼滇士有事至者醉宿其家有銀數兩在袖中夜密置枕下向曉有友急呼之告以家禍其士驚起遂歸行十里許憶所袖銀置娼家枕下自以為必不可得矣試返而求之娼曰固在此完封還之夫人至為盜為娼本心已盡亡矣而因憐死止盜因假義不取然則仁義之根於性有固無時而息耶而仕以行義乃貪利無厭殺人喪已方揚揚然大小交慶而略不耻何也五刑今制五刑笞枤徒流絞斬古之五刑墨劓剕宫大辟然臧文仲曰大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽笮薄刑用鞭撲則又以甲兵斧鉞刀鋸鑽笮鞭撲為五刑矣若秦漢之要斬斬左右趾城旦舂之類均不出此而只異其名也三字義每讀書作文只云義利顧無敢用利義者只云利害顧無有用害利者因靜思之天地之理必有義斯有利故曰利者義之和曰義以生利曰以義為利曰義之所安即利之所在蓋利根於義有義斯有利也天下之事凡有利必有害故曰求利未得而害已隨之曰利之所在害之所在也曰小人以為有利於國而不知其終為害蓋害根於利有利斯有害也若曰先於義則利隨之先於利則害隨之有自然不可逃者而今士只先於利而不知害何愚如之害至不知而視以為利則為害至矣是故覆宗絶嗣害何其深彼只妄歸之命壞名灾已子孫不昌彼則妄委之數顧以害為利而終罔覺也夫利首於財賄極於身名貪汙無知者利之粗也全身好名者利之精也其為利一也粗而粗應精而精應其為害一也或疑古之為義者身亡家破世絶者多矣何謂利根於義而自不可離乎則請以好名為利之心反觀彼之名所以亘天地繫於人心而不泯者為利不亦精乎故曰皆自然之理必然之事而人自不識耳是故無義之利則必害義之一字主宰乎利利之一字附麗乎害失義則切於利而迫於害矣合義則近於利而逺於害矣利在中義在利上害在利下此三字之序昭然貫古今通四海而不可易者而士之作文修辭者略不少究其義千計萬術只求以利身利家欺上罔下豈非愚之甚哉豫嘗作二字義說其旁引推明頗備辭多不能載征麓川靖逺伯征麓川初用江西徐莭仙行符術說思任用黑犬等物有識皆笑之後於所斬慢功官士皆以為竒功各升其子曰當時不如此功不就令不嚴也有識又稱之夷稱法大伯夷謂天為法法作上聲故其酋皆加法字如思仁法思機法是也其有告請則不敢加法字中國行彼亦不用法字也猛密猛密舊屬木邦其陶猛亦同姓初木邦宣慰罕楪以女曩罕弄妻司歪因猛密有寶井故使守之楪死子落立落死孫穵為宣慰嗜酒好殺曩罕弄遂以猛密叛然猶未敢侵占木邦也南寧伯毛勝既以賄創始鎮守遂大誘取猛密寶石俾自入貢從是勢益張至成化十年雲南鎮守太監錢能日遣人誆之以取寶石其勢始熾至成化庚子太監王舉索寶石不獲遂疏其叛木邦之罪請征之曩罕弄懼有江西人周賔五教之曰今萬閣老名為要錢又當權且新結昭德宫與萬皇親家最密若遣人賫重寶投之不止不征更可開衙門討官矣於是遣人多賣金寶往見萬遂許之召職方劉郎中大夏啖以美遷俾往官司柄劉不從遂舉丁憂都御史程宗任之時雲南巡撫吳誠宗同年也言不可宗大怒曰今萬公甚嗛汝敢復忤之吳憂悶不知所為遂卒程乃率鎮守及三司往時成化十八年壬寅冬也適曩罕弄所遣投萬之使已備悉萬意矣及宗往凡猛密使至皆犒宴之木邦使笞辱之兾曩罕弄出迎不思曩罕弄以是益踞傲不出且索見欲坐講宗亦許之而鎮守藩臬多不欲直曩罕弄不至宗遂自往過南牙山就見之既坐則曰我猛密之於木邦初如小象在大象腹中今小象長成大於大象矣可使復納於舊腹中乎宗遂盡以所奪木邦地畀之為設安撫司而木邦所有不過十之二三而已由是孟養諸蕃大失望程宗即為雲南巡撫驕奢貪縱日益甚尋升刑侍郎轉刑書而曩罕㺯遂盡取木邦之地罕究奔猛止不如一村孟飬不平遣大陶猛倫索提兵衛之僅得命矣適孝廟更化萬黜程歸而復值林憲副俊方大參守往猛密猶以𬗟書來如前􅀢鷔林杖其二使猛密懼始得故地畀木邦又必欲進貢由木邦方逺雖不杲然以時政清明又林方秉正木邦始有故地什三四而足以自立矣當林杖猛密之使衆危之巡撫王都御史詔自滇來永昌以防變聞遂懾服王甚嘉林後罕究死子烈遂與猛密為世讐而日交兵焉其心只怨成化之屈遂忘𢎞治之再生其命而在上竟無知之者夫猛密之失萌於毛勝盛於錢能王舉而成於萬程終使再無以善其後如此不識史書其事可能不誤否故書豫目擊耳聞者於此然亦撮其概而不能盡其詳也稱寡人義幼聼瞽者唱詞稱寡人不知其意稍長讀孟子始知其解一日先君舉以問即以寡德之稱對先君又問曰稱孤何解遂不能對先君曰老子書曰貴以賤為本是以侯王自謂孤寡不榖又曰人之所惡唯孤寡不榖而王公以為稱恐據此解為是豫謹識之長而取老子書再玩之覺寡德之稱真誤也掘陵輟耕録載元總統楊璉真伽發宋陵寢暨唐林二義士之事甚詳後華亭彭瑋又訂補其未備則我聖祖之功德照耀古今矣但云桑哥矯可其奏則於元世祖亦欲末减然揆之理則裒諸骨築一塔壓之名曰鎮南至張士誠方毁觀命名之義與世祖誅桑哥後又三年方崩而傳及數世不敢毁之意推之則實世祖可其奏而非桑哥矯制也瑋不察此而信勝國之諱詞豈不誤哉又理宗本不當立以濟王得怨於史彌逺遂立而終不為濟王立後故身後之報若此至於徽宗陵唯有朽木一段欽宗陵唯有木燈檠一枚此正天道發見以暴賊檜之欺誣而亦不置論故因表此三事以附之論山水輟耕録林昉㑹友逰山檄云人有殘縑敗素一山一水售之千金至真景則略不加喜無乃貴僞而賤真耶近亦有此論此全不知畫之妙理者夫山水誠真然非跋涉登臨其可得觀縱得觀焉其廣大淵深其可得究今夫名畫撮山水之大而布於咫尺之內坐而閲之造化之顯著物理之幽潜一展玩而可使塵襟灑然心目怡曠與真宰逰而與世氛絶爾自得其妙殆與樂於詩而陶冶性靈者同揆彼以真僞為言者豈足以知此哉夫以朱子之賢蘇子之達罔不留意焉則非深得其趣者固未易言也本心明三原王公既回錢塘吳公誠代之太監錢能遣都指揮胡亮迎宴於平夷回問亮曰比王某何如亮曰甚好敬重公公不同能微笑曰王某只不合與我作對頭不然這樣巡撫只好與他提草鞋耳夫以能之怨王公而本心難泯至如此為士者可不務乎南園漫録卷七
