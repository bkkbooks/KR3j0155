body:
  text: 題南園漫録後跋徃草此以付㓜子合合時方九齡今合試京師五年偶於其書笥中見之殆不復記憶悵然興懷乃自録出然以是是非非枉枉直直斤斤明明視筆談不及士夫毁譽者異矣復欲藏之適見廣昌何公喬新集所載撫夷録謬甚然後知姦邪矯誣足以欺一時矣而其術又足以假名臣聞人文其惡而惑後世用是刻以乆之或以招尤速累為虞者則曰孫盛紀枋頭之敗桓温謂關門戸事諸子請改盛大怒更為定本寄慕容雋孔子曰斯民也三代所以直道而行也吾不佞敢自棄不如春秋之民不如東晉之士而又敢以不如桓温待今世之賢哉
